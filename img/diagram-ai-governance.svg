<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tealGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="440" rx="12" fill="#131313"/>
  <rect x="1" y="1" width="898" height="438" rx="11" fill="none" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Title -->
  <text x="40" y="44" fill="#e8e8e8" font-size="16" font-weight="700" letter-spacing="-0.01em">3-Layer AI Content Governance</text>
  <text x="40" y="66" fill="#555" font-size="12" font-weight="500">Designing trust into non-deterministic systems</text>

  <!-- Layer 1 -->
  <rect x="40" y="95" width="820" height="95" rx="10" fill="url(#tealGrad3)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="56" y="109" width="28" height="28" rx="6" fill="#2dd4bf" fill-opacity="0.15"/>
  <text x="70" y="129" fill="#2dd4bf" font-size="14" font-weight="700" text-anchor="middle">1</text>
  <text x="100" y="125" fill="#e8e8e8" font-size="14" font-weight="600">Visual Identification</text>
  <text x="100" y="148" fill="#888" font-size="12">Clear, consistent signals that content is AI-generated. Not buried in fine print — woven into the surface</text>
  <text x="100" y="168" fill="#888" font-size="12">design so users always understand what they're reading.</text>

  <!-- Connector -->
  <line x1="450" y1="190" x2="450" y2="210" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3 3"/>

  <!-- Layer 2 -->
  <rect x="40" y="210" width="820" height="95" rx="10" fill="url(#tealGrad3)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.25"/>
  <rect x="56" y="224" width="28" height="28" rx="6" fill="#2dd4bf" fill-opacity="0.15"/>
  <text x="70" y="244" fill="#2dd4bf" font-size="14" font-weight="700" text-anchor="middle">2</text>
  <text x="100" y="240" fill="#e8e8e8" font-size="14" font-weight="600">Tone &amp; Voice</text>
  <text x="100" y="263" fill="#888" font-size="12">Guidelines for how AI-summarized content should sound when representing Reddit's communities.</text>
  <text x="100" y="283" fill="#888" font-size="12">Informative without being authoritative about subjective topics. Partnered with content design.</text>

  <!-- Connector -->
  <line x1="450" y1="305" x2="450" y2="325" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3 3"/>

  <!-- Layer 3 -->
  <rect x="40" y="325" width="820" height="95" rx="10" fill="url(#tealGrad3)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="56" y="339" width="28" height="28" rx="6" fill="#2dd4bf" fill-opacity="0.15"/>
  <text x="70" y="359" fill="#2dd4bf" font-size="14" font-weight="700" text-anchor="middle">3</text>
  <text x="100" y="355" fill="#e8e8e8" font-size="14" font-weight="600">Prompt Design Workflow</text>
  <text x="100" y="378" fill="#888" font-size="12">Cross-functional review process: content design + AI engineering + product design collaboratively</text>
  <text x="100" y="398" fill="#888" font-size="12">evaluate prompts against accuracy, tone alignment, edge cases, and trust signals.</text>

  <!-- Side annotation -->
  <line x1="870" y1="120" x2="880" y2="120" stroke="#555" stroke-width="1"/>
  <line x1="880" y1="120" x2="880" y2="370" stroke="#555" stroke-width="1"/>
  <line x1="870" y1="370" x2="880" y2="370" stroke="#555" stroke-width="1"/>
  <text x="892" y="250" fill="#555" font-size="10" font-weight="500" transform="rotate(90 892 250)" text-anchor="middle">TRUST STACK</text>
</svg>
