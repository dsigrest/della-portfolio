<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOT-24 Surface Trade-offs (Mobile)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --canvas: #0A0C16; --card: #10121C; --elevated: #151722;
      --text-pri: #E0DFE4; --text-sec: rgba(224,223,228,0.6); --text-ter: rgba(224,223,228,0.4); --text-dim: rgba(224,223,228,0.2);
      --border-normal: rgba(224,223,228,0.07);
      --accent: #7FB5B0; --accent-dim: rgba(127,181,176,0.12);
      --red: #C47878;
      --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
      --glass-border: rgba(224,223,228,0.08);
      --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--canvas);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-pri);
      padding: 0;
      margin: 0;
    }

    body.embedded { padding: 0; min-height: auto; display: block; background: transparent; overflow: hidden; }
    body.embedded .diagram { width: 100%; max-width: none; border-radius: 0; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .diagram {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 0;
    }

    .comparison {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 0 16px;
      width: 100%;
      margin: 0 auto;
    }

    .col {
      animation: fadeUp 0.6s var(--spring) forwards;
      opacity: 0;
    }

    .col:nth-child(1) { animation-delay: 0.1s; }
    .col:nth-child(2) { animation-delay: 0.2s; }
    .col:nth-child(3) { animation-delay: 0.3s; }

    .col-label {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-pri);
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .mock-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 272/588;
      margin-bottom: 12px;
      border-radius: 16px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border-normal);
    }

    .mock {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .annotation {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-highlight);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
    }

    .annotation-title {
      font-weight: 600;
      color: var(--text-pri);
      margin-bottom: 4px;
      font-size: 12px;
    }

    .annotation-desc {
      color: var(--text-sec);
      font-weight: 400;
      font-size: 11px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <!--
    DELLA: column labels + annotation copy were AI-invented by the original agent.
    Need your verify against Figma 1214:18741 (mobile node). Image refs preserved.
  -->
  <div class="diagram">
    <div class="comparison">

        <div class="mock-frame">
          <img class="mock" src="assets/not24-inbox.png" alt="Inbox surface">
        </div>
        <div class="annotation">
          <div class="annotation-title"><!-- DELLA: replace with Figma copy --></div>
          <div class="annotation-desc"><!-- DELLA: replace with Figma copy --></div>
        </div>
      </div>

      <div class="col">
        <div class="col-label">Private messages <!-- DELLA: verify --></div>
        <div class="mock-frame">
          <img class="mock" src="assets/not24-pms.png" alt="Private messages surface">
        </div>
        <div class="annotation">
          <div class="annotation-title"><!-- DELLA: replace with Figma copy --></div>
          <div class="annotation-desc"><!-- DELLA: replace with Figma copy --></div>
        </div>
      </div>

      <div class="col">
        <div class="col-label">Chat <!-- DELLA: verify --></div>
        <div class="mock-frame">
          <img class="mock" src="assets/not24-chat.png" alt="Chat surface">
        </div>
        <div class="annotation">
          <div class="annotation-title"><!-- DELLA: replace with Figma copy --></div>
          <div class="annotation-desc"><!-- DELLA: replace with Figma copy --></div>
        </div>
      </div>
    </div>
  </div>

<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
<!-- diagram-height-poster v1 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (!d) return 0;
    return Math.max(d.scrollHeight, d.offsetHeight,
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0);
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', send);
  else send();
  window.addEventListener('load', send);
  setTimeout(send, 50); setTimeout(send, 250); setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', send);
})();
</script>
</body>
</html>
