<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORT-02c — Research Synthesis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16;
    --card: #10121C;
    --elevated: #151722;
    --text-pri: #E0DFE4;
    --text-sec: rgba(224,223,228,0.6);
    --text-ter: rgba(224,223,228,0.4);
    --text-dim: rgba(224,223,228,0.2);
    --border-normal: rgba(224,223,228,0.07);
    --accent: #7FB5B0;
    --accent-dim: rgba(127,181,176,0.12);
    --casual: #D4A574;
    --resur: #C4B078;
    --blue: #8A9EC4;
    --red: #C47878;
    --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
    --glass-border: rgba(224,223,228,0.08);
    --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);

    --ramp: #7FB5B0;
    --anthropic: #C47878;
    --meta: #8A9EC4;
    --figma: #C4B078;
    --openai: rgba(224,223,228,0.5);
    --cursor: #C47878;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #08090F;
    display: flex;
    justify-content: center;
    padding: 40px;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .diagram {
    width: 760px;
    background: var(--canvas);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    opacity: 0;
    animation: fadeIn 0.7s ease-out 0.1s forwards;
  }
  /* Embed mode: strip body chrome when loaded in iframe */
  body.embedded {
    padding: 0;
    min-height: auto;
    display: block;
    background: transparent;
    overflow: hidden;
  }
  body.embedded .diagram {
    width: 100%;
    border-radius: 0;
  }
  .diagram::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 320px 280px at 50% 50%, rgba(127,181,176,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Tab bar ── */
  .tab-bar {
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 36px 48px 0;
    position: relative;
    z-index: 2;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-ter);
    border-bottom: 2px solid transparent;
    transition: color 0.3s ease, border-color 0.3s ease;
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 0.5s ease-out forwards;
  }
  .tab:nth-child(1) { animation-delay: 0.15s; }
  .tab:nth-child(2) { animation-delay: 0.20s; }
  .tab:nth-child(3) { animation-delay: 0.25s; }
  .tab:nth-child(4) { animation-delay: 0.30s; }
  .tab:nth-child(5) { animation-delay: 0.35s; }
  .tab:nth-child(6) { animation-delay: 0.40s; }
  .tab-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .tab.active {
    color: var(--text-pri);
    border-bottom-color: var(--accent);
  }
  .tab:hover:not(.active) {
    color: var(--text-sec);
  }

  /* ── Connector paths (top) ── */
  .connector-section {
    position: relative;
    height: 60px;
    z-index: 1;
  }
  .connector-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* ── Machine center ── */
  .machine-center {
    display: flex;
    justify-content: center;
    padding: 0 48px;
    position: relative;
    z-index: 2;
  }
  .machine-hub {
    width: 120px;
    height: 120px;
    position: relative;
    opacity: 0;
    animation: machineReveal 0.8s ease-out 0.5s forwards;
  }
  @keyframes machineReveal {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  .machine-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 200px; height: 200px;
    background: radial-gradient(ellipse at center, rgba(127,181,176,0.12) 0%, transparent 70%);
    filter: blur(20px);
    pointer-events: none;
  }
  .machine-hub svg {
    width: 120px; height: 120px;
    position: relative;
    z-index: 1;
  }
  .machine-label {
    text-align: center;
    margin-top: 8px;
    padding: 0 48px;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeIn 0.5s ease-out 0.8s forwards;
  }
  .machine-label-text {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.7;
  }
  .machine-label-sub {
    font-size: 11px;
    color: var(--text-ter);
    margin-top: 2px;
  }

  /* Particles */
  .particle {
    position: absolute;
    width: 3px; height: 3px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    animation: particleDrift 3s ease-in-out infinite;
  }
  .particle:nth-child(1) { top: 25%; left: 20%; animation-delay: 0s; }
  .particle:nth-child(2) { top: 40%; left: 75%; animation-delay: 0.8s; }
  .particle:nth-child(3) { top: 65%; left: 30%; animation-delay: 1.6s; }
  .particle:nth-child(4) { top: 55%; left: 65%; animation-delay: 2.4s; }
  @keyframes particleDrift {
    0%, 100% { opacity: 0; transform: translateY(0); }
    50% { opacity: 0.5; transform: translateY(-6px); }
  }

  /* ── Connector paths (bottom) ── */
  .connector-section-bottom {
    position: relative;
    height: 60px;
    z-index: 1;
  }

  /* ── Dimension cards ── */
  .dimension-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    padding: 0 48px 40px;
    position: relative;
    z-index: 2;
  }
  .dim-card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-highlight);
    border-radius: 10px;
    padding: 16px 12px;
    text-align: center;
    opacity: 0;
    animation: cardEmerge 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .dim-card:nth-child(1) { animation-delay: 0.9s; }
  .dim-card:nth-child(2) { animation-delay: 0.95s; }
  .dim-card:nth-child(3) { animation-delay: 1.0s; }
  .dim-card:nth-child(4) { animation-delay: 1.05s; }
  .dim-card:nth-child(5) { animation-delay: 1.1s; }
  @keyframes cardEmerge {
    from { opacity: 0; transform: translateY(16px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .dim-icon {
    width: 28px; height: 28px;
    margin: 0 auto 10px;
    opacity: 0.7;
  }
  .dim-name {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-pri);
    margin-bottom: 6px;
    line-height: 1.3;
    letter-spacing: 0.01em;
  }
  .dim-range {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    opacity: 0.7;
    letter-spacing: 0.02em;
  }

  /* ── SVG line animation ── */
  .flow-line {
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.2;
    opacity: 0.25;
    stroke-dasharray: 6, 4;
    stroke-dashoffset: 0;
    animation: flowDown 2s linear infinite;
  }
  @keyframes flowDown {
    from { stroke-dashoffset: 20; }
    to { stroke-dashoffset: 0; }
  }
  .flow-line-up {
    animation-direction: reverse;
  }

  @media (max-width: 680px) {
    .tab-bar, .machine-center, .machine-label, .dimension-row { padding-left: 24px; padding-right: 24px; }
    body { padding: 16px; }
    .dimension-row { grid-template-columns: repeat(3, 1fr); }
    .tab { padding: 8px 10px; font-size: 10px; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="diagram">

    <!-- Tab bar: 6 companies -->
    <div class="tab-bar">
      <div class="tab active"><div class="tab-dot" style="background: var(--ramp);"></div>Ramp</div>
      <div class="tab"><div class="tab-dot" style="background: var(--anthropic);"></div>Anthropic</div>
      <div class="tab"><div class="tab-dot" style="background: var(--meta);"></div>Meta</div>
      <div class="tab"><div class="tab-dot" style="background: var(--figma);"></div>Figma</div>
      <div class="tab"><div class="tab-dot" style="background: var(--openai);"></div>OpenAI</div>
      <div class="tab"><div class="tab-dot" style="background: var(--cursor);"></div>Cursor</div>
    </div>

    <!-- Connector lines flowing down into machine -->
    <div class="connector-section">
      <svg class="connector-svg" viewBox="0 0 760 60" preserveAspectRatio="xMidYMid meet">
        <path class="flow-line" d="M 130 0 Q 130 30 250 55"/>
        <path class="flow-line" d="M 230 0 Q 230 25 300 55"/>
        <path class="flow-line" d="M 330 0 L 350 55"/>
        <path class="flow-line" d="M 430 0 L 410 55"/>
        <path class="flow-line" d="M 530 0 Q 530 25 460 55"/>
        <path class="flow-line" d="M 630 0 Q 630 30 510 55"/>
      </svg>
    </div>

    <!-- Centered machine icon -->
    <div class="machine-center">
      <div class="machine-hub">
        <div class="machine-glow"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer ring -->
          <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(127,181,176,0.2)" stroke-width="1.5"/>
          <!-- Inner ring -->
          <circle cx="60" cy="60" r="35" fill="none" stroke="rgba(127,181,176,0.3)" stroke-width="1.2"/>
          <!-- Gear teeth -->
          <g stroke="var(--accent)" stroke-width="1.5" opacity="0.5">
            <line x1="60" y1="5" x2="60" y2="14"/>
            <line x1="60" y1="106" x2="60" y2="115"/>
            <line x1="5" y1="60" x2="14" y2="60"/>
            <line x1="106" y1="60" x2="115" y2="60"/>
            <line x1="21" y1="21" x2="28" y2="28"/>
            <line x1="92" y1="92" x2="99" y2="99"/>
            <line x1="99" y1="21" x2="92" y2="28"/>
            <line x1="21" y1="99" x2="28" y2="92"/>
          </g>
          <!-- Center dot -->
          <circle cx="60" cy="60" r="5" fill="var(--accent)" opacity="0.8"/>
          <!-- Spokes -->
          <line x1="60" y1="60" x2="60" y2="25" stroke="rgba(127,181,176,0.25)" stroke-width="1"/>
          <line x1="60" y1="60" x2="95" y2="60" stroke="rgba(127,181,176,0.25)" stroke-width="1"/>
          <line x1="60" y1="60" x2="60" y2="95" stroke="rgba(127,181,176,0.25)" stroke-width="1"/>
          <line x1="60" y1="60" x2="25" y2="60" stroke="rgba(127,181,176,0.25)" stroke-width="1"/>
          <!-- Inner particles -->
          <circle cx="48" cy="45" r="2" fill="var(--accent)" opacity="0.5"/>
          <circle cx="72" cy="55" r="2" fill="var(--accent)" opacity="0.4"/>
          <circle cx="55" cy="72" r="2" fill="var(--accent)" opacity="0.35"/>
        </svg>
      </div>
    </div>
    <div class="machine-label">
      <div class="machine-label-text">AI-Assisted Synthesis</div>
      <div class="machine-label-sub">50+ requirements extracted across 6 companies</div>
    </div>

    <!-- Connector lines flowing down from machine -->
    <div class="connector-section-bottom">
      <svg class="connector-svg" viewBox="0 0 760 60" preserveAspectRatio="xMidYMid meet">
        <path class="flow-line flow-line-up" d="M 250 5 Q 250 30 110 55"/>
        <path class="flow-line flow-line-up" d="M 300 5 Q 300 25 250 55"/>
        <path class="flow-line flow-line-up" d="M 370 5 L 380 55"/>
        <path class="flow-line flow-line-up" d="M 430 5 Q 430 25 510 55"/>
        <path class="flow-line flow-line-up" d="M 490 5 Q 490 30 650 55"/>
      </svg>
    </div>

    <!-- 5 Dimension cards -->
    <div class="dimension-row">
      <div class="dim-card">
        <div class="dim-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" stroke="var(--accent)" stroke-width="1.5"/>
            <polyline points="14 2 14 8 20 8" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
            <line x1="8" y1="13" x2="16" y2="13" stroke="var(--accent)" stroke-width="1" opacity="0.5"/>
            <line x1="8" y1="17" x2="14" y2="17" stroke="var(--accent)" stroke-width="1" opacity="0.5"/>
          </svg>
        </div>
        <div class="dim-name">Portfolio Clarity</div>
        <div class="dim-range">10–20%</div>
      </div>

      <div class="dim-card">
        <div class="dim-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
            <polygon points="12 2 15.09 10.26 24 10.27 17.55 16.16 19.64 24.42 12 18.53 4.36 24.42 6.45 16.16 0 10.27 8.91 10.26 12 2" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
          </svg>
        </div>
        <div class="dim-name">Craft Mastery</div>
        <div class="dim-range">15–30%</div>
      </div>

      <div class="dim-card">
        <div class="dim-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
            <circle cx="12" cy="12" r="10" stroke="var(--accent)" stroke-width="1.5"/>
            <polyline points="12 6 12 12 16 14" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <div class="dim-name">Scope Navigation</div>
        <div class="dim-range">15–25%</div>
      </div>

      <div class="dim-card">
        <div class="dim-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="9" cy="7" r="4" stroke="var(--accent)" stroke-width="1.5"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="dim-name">Technical Collab</div>
        <div class="dim-range">20–30%</div>
      </div>

      <div class="dim-card">
        <div class="dim-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <polyline points="17 6 23 6 23 12" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <div class="dim-name">Impact Story</div>
        <div class="dim-range">10–30%</div>
      </div>
    </div>
  </div>

<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
</body>
</html>
