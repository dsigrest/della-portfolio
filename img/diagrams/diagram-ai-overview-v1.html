<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="figma-source" content="node:1203:5207 page:29:42 file:TArUrZsBUocaAsqetjXq7V">
<title>Reddit Answers — Page Overview (Search Results Before vs After)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16;
    --phone-bg: #0E0F14;
    --phone-text-pri: #F2F2F2;
    --phone-text-sec: rgba(255,255,255,0.65);
    --phone-text-ter: rgba(255,255,255,0.45);
    --phone-divider: rgba(255,255,255,0.07);
    --reddit-orange: #FF4500;
    --google-blue: #8AB4F8;
    --tab-active: #8AB4F8;
    --casual-red: #C47878;
    --cool-teal: #7FB5B0;
    --text-primary: #E0DFE4;
    --text-dim: rgba(224,223,228,0.30);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08090F;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .diagram {
    width: 760px;
    background: var(--canvas);
    border-radius: 16px;
    padding: 40px 40px 32px;
    position: relative;
  }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    align-items: start;
  }
  .column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* State pills (BEFORE / AFTER) */
  .pill {
    display: inline-flex;
    align-items: center;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .pill.below {
    color: var(--casual-red);
    background: rgba(196,120,120,0.08);
    border: 1px solid rgba(196,120,120,0.18);
  }
  .pill.above {
    color: var(--cool-teal);
    background: rgba(127,181,176,0.08);
    border: 1px solid rgba(127,181,176,0.18);
  }

  /* Phone bezel — wraps the embedded UI screenshot PNG */
  .phone {
    width: 100%;
    max-width: 296px;
    background: var(--phone-bg);
    border-radius: 28px;
    overflow: hidden;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 0 0 1px rgba(255,255,255,0.05),
      0 18px 40px rgba(0,0,0,0.45);
    display: block;
  }
  .phone img.ui-screenshot {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 28px;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 18px 6px;
    font-size: 11px;
    color: var(--phone-text-pri);
    font-weight: 600;
  }
  .status-icons {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .status-icons svg { display: block; }

  /* Google search bar */
  .gbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px 10px;
  }
  .gbar-input {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1F2024;
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--phone-text-pri);
  }
  .g-logo {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: conic-gradient(from 0deg,#4285F4 0 25%,#EA4335 25% 50%,#FBBC05 50% 75%,#34A853 75% 100%);
    flex-shrink: 0;
  }
  .gbar-input .query { flex: 1; line-height: 1; }
  .mic {
    width: 12px; height: 12px;
    color: var(--phone-text-sec);
    flex-shrink: 0;
  }
  .profile-pic {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FFB58A 0%, #C47878 60%, #6B4F3D 100%);
    flex-shrink: 0;
    border: 1.5px solid var(--cool-teal);
  }

  /* Tabs row */
  .tabs {
    display: flex;
    gap: 18px;
    padding: 8px 16px 0;
    overflow: hidden;
    border-bottom: 1px solid var(--phone-divider);
  }
  .tab {
    font-size: 11px;
    color: var(--phone-text-sec);
    padding: 6px 0 8px;
    white-space: nowrap;
    position: relative;
    flex-shrink: 0;
  }
  .tab.active {
    color: var(--tab-active);
    font-weight: 600;
  }
  .tab.active::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 2px;
    background: var(--tab-active);
    border-radius: 2px;
  }

  /* Filter chips */
  .chips {
    display: flex;
    gap: 6px;
    padding: 10px 12px 8px;
    overflow: hidden;
  }
  .chip {
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 10px;
    color: var(--phone-text-pri);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Search result cards (BELOW) */
  .results {
    display: flex;
    flex-direction: column;
    padding: 0 16px;
    flex: 1;
  }
  .result {
    padding: 12px 0;
    border-bottom: 1px solid var(--phone-divider);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .result:last-child { border-bottom: none; }
  .result-head {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .reddit-icon {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--reddit-orange);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 9px;
    font-weight: 700;
  }
  .result-source {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
    flex: 1;
  }
  .result-domain {
    font-size: 10px;
    color: var(--phone-text-pri);
  }
  .result-url {
    font-size: 9px;
    color: var(--phone-text-ter);
  }
  .result-more {
    color: var(--phone-text-ter);
    font-size: 12px;
    line-height: 1;
    flex-shrink: 0;
  }
  .result-title {
    font-size: 13px;
    color: var(--google-blue);
    font-weight: 500;
    line-height: 1.25;
    margin-top: 2px;
  }
  .result-snippet {
    font-size: 10.5px;
    color: var(--phone-text-sec);
    line-height: 1.4;
  }

  /* ABOVE — Reddit Answers card */
  .answers-card {
    margin: 6px 16px 0;
    padding: 10px 0 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-bottom: 1px solid var(--phone-divider);
  }
  .answers-head {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .answers-source {
    flex: 1;
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }
  .answers-platform {
    font-size: 10px;
    color: var(--phone-text-pri);
    font-weight: 500;
  }
  .answers-meta {
    font-size: 9.5px;
    color: var(--phone-text-ter);
  }
  .answers-title {
    font-size: 13px;
    color: var(--google-blue);
    font-weight: 500;
    line-height: 1.25;
  }
  .answers-snippet {
    font-size: 10.5px;
    color: var(--phone-text-sec);
    line-height: 1.4;
  }
  .answer-quotes {
    display: grid;
    grid-template-columns: 1fr 0.7fr;
    gap: 6px;
    margin-top: 4px;
  }
  .quote {
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    overflow: hidden;
  }
  .quote-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 8.5px;
    color: var(--cool-teal);
    font-weight: 600;
  }
  .quote-tag.plain { color: var(--phone-text-sec); font-weight: 500; }
  .quote-check {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--cool-teal);
    color: #0A0C16;
    font-size: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-weight: 800;
  }
  .quote-text {
    font-size: 9.5px;
    color: var(--phone-text-pri);
    line-height: 1.35;
  }
  .quote-more {
    color: var(--phone-text-ter);
    font-weight: 500;
  }

  /* Sourced post links (ABOVE) */
  .source-links {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
  }
  .source-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 9px 0;
    border-bottom: 1px solid var(--phone-divider);
  }
  .source-link-text {
    display: flex;
    flex-direction: column;
    gap: 1px;
    flex: 1;
    min-width: 0;
  }
  .source-link-title {
    font-size: 11px;
    color: var(--phone-text-pri);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .source-link-date {
    font-size: 9.5px;
    color: var(--phone-text-ter);
  }
  .source-link-arrow {
    color: var(--phone-text-ter);
    font-size: 12px;
    flex-shrink: 0;
  }
  .more-results {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 0;
    border-bottom: 1px solid var(--phone-divider);
    font-size: 11px;
    color: var(--phone-text-pri);
  }
  .more-arrow {
    color: var(--phone-text-sec);
    font-size: 12px;
  }
  .cr-card {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
  }
  .cr-icon {
    width: 22px; height: 22px;
    border-radius: 4px;
    background: #008060;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .cr-meta {
    flex: 1;
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }
  .cr-name { font-size: 10px; color: var(--phone-text-pri); }
  .cr-url { font-size: 9px; color: var(--phone-text-ter); }

  /* Phone bottom nav */
  .phone-nav {
    margin-top: auto;
    display: flex;
    justify-content: space-around;
    padding: 12px 16px 10px;
    border-top: 1px solid var(--phone-divider);
    background: rgba(0,0,0,0.25);
  }
  .nav-icon {
    color: var(--phone-text-sec);
    width: 16px; height: 16px;
    flex-shrink: 0;
  }
  .home-bar {
    display: block;
    width: 96px;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.6);
    margin: 8px auto 6px;
  }

  /* Annotation list — prose style, no chip backgrounds */
  .annotations {
    display: flex;
    flex-direction: column;
    width: 100%;
  }
  .annotation {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    font-size: 11px;
    font-weight: 600;
    line-height: normal;
    color: var(--text-primary);
  }
  .annotation .ann-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .annotation .ann-icon svg { display: block; }
  .annotation.below .ann-icon { color: var(--casual-red); }
  .annotation.above .ann-icon { color: var(--cool-teal); }

  /* Embedded mode */
  body.embedded {
    padding: 0;
    background: transparent;
    min-height: auto;
    display: block;
  }
  body.embedded .diagram {
    width: 100%;
    border-radius: 0;
  }

  /* Narrow viewport: stack columns */
  @media (max-width: 720px) {
    .diagram { padding: 24px 20px 24px; }
    .columns { grid-template-columns: 1fr; gap: 32px; }
  }
</style>
</head>
<body>
  <div class="diagram">
    <div class="columns">

      <!-- ===== SEARCH RESULTS BEFORE — left ===== -->
      <div class="column">
        <span class="pill below">Search Results Before</span>

        <div class="phone">
          <img class="ui-screenshot" src="../ui-overview-below.png" alt="Google search results page for 'best sunscreen 2024' showing three reddit.com result cards — multiple links compete to rank, user bounces in search of answer" />

          </div>

                <line x1="12" y1="4" x2="4" y2="12"/>
              </svg>

          </div>

      <!-- ===== SEARCH RESULTS AFTER — right ===== -->
      <div class="column">
        <span class="pill above">Search Results After</span>

        <div class="phone">
          <img class="ui-screenshot" src="../ui-overview-above.png" alt="Google search results page for 'best sunscreen 2024' showing Reddit Answers AI-synthesis card above fold with cited source posts and a Consumer Reports linked reference — single link consolidates information" />

      </div>

    </div>
  </div>

<script>if(window!==window.parent)document.body.classList.add("embedded");</script>
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (!d) return 0;
    return Math.max(
      d.scrollHeight, d.offsetHeight,
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0
    );
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) {
      window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', send);
  } else {
    send();
  }
  window.addEventListener('load', send);
  setTimeout(send, 50);
  setTimeout(send, 250);
  setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', send);
})();
</script>
