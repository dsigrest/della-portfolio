<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="figma-source" content="node:390:2 page:29:42 file:TArUrZsBUocaAsqetjXq7V">
<title>Graceful Degradation — above vs below threshold</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16;
    --casual-red: #C47878;
    --cool-teal: #7FB5B0;
    --text-primary: #E0DFE4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08090F;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .diagram {
    width: 760px;
    background: var(--canvas);
    border-radius: 16px;
    padding: 24px 48px;
  }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    align-items: start;
  }
  .column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* State pills (ABOVE / BELOW) */
  .pill {
    display: inline-flex;
    align-items: center;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .pill.below {
    color: var(--casual-red);
    background: rgba(196,120,120,0.08);
    border: 1px solid rgba(196,120,120,0.18);
  }
  .pill.above {
    color: var(--cool-teal);
    background: rgba(127,181,176,0.08);
    border: 1px solid rgba(127,181,176,0.18);
  }

  /* Embedded UI screenshot — clean rounded image, no bezel chrome */
  .shot {
    width: 100%;
    display: block;
  }
  .shot img.ui-screenshot {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 16px;
  }

  /* Annotation list — prose style, no chip backgrounds */
  .annotations {
    display: flex;
    flex-direction: column;
    width: 100%;
  }
  .annotation {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    font-size: 11px;
    font-weight: 600;
    line-height: normal;
    color: var(--text-primary);
  }
  .annotation .ann-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .annotation .ann-icon svg { display: block; }
  .annotation.below .ann-icon { color: var(--casual-red); }
  .annotation.above .ann-icon { color: var(--cool-teal); }

  /* Embedded mode */
  body.embedded {
    padding: 0;
    background: transparent;
    min-height: auto;
    display: block;
  }
  body.embedded .diagram {
    width: 100%;
    border-radius: 0;
  }

  /* Narrow viewport: stack columns */
  @media (max-width: 720px) {
    .diagram { padding: 24px 20px; }
    .columns { grid-template-columns: 1fr; gap: 32px; }
  }
</style>
</head>
<body>
  <div class="diagram">
    <div class="columns">

      <!-- ===== ABOVE THRESHOLD — left ===== -->
      <div class="column">
        <span class="pill above">Above Threshold</span>

        <div class="shot">
          <img class="ui-screenshot" src="../ui-reddit-answers-mobile.png" alt="Reddit Answers mobile mock — AI synthesis visible above fold with citations, source posts available below" />
        </div>

        <div class="annotations">
          <div class="annotation above">
            <span class="ann-icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3.5,8.5 6.5,11.5 12.5,5"/>
              </svg>
            </span>
            AI synthesis visible above fold with citations
          </div>
          <div class="annotation above">
            <span class="ann-icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3.5,8.5 6.5,11.5 12.5,5"/>
              </svg>
            </span>
            Source posts available below
          </div>
        </div>
      </div>

      <!-- ===== BELOW THRESHOLD — right ===== -->
      <div class="column">
        <span class="pill below">Below Threshold</span>

        <div class="shot">
          <img class="ui-screenshot" src="../ui-source-posts.png" alt="Reddit threaded source posts mock — synthesis suppressed below confidence threshold, raw source posts surface as fallback" />
        </div>

        <div class="annotations">
          <div class="annotation below">
            <span class="ann-icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
                <line x1="4" y1="4" x2="12" y2="12"/>
                <line x1="12" y1="4" x2="4" y2="12"/>
              </svg>
            </span>
            Synthesis suppressed — quality below confidence threshold
          </div>
          <div class="annotation below">
            <span class="ann-icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
                <line x1="4" y1="4" x2="12" y2="12"/>
                <line x1="12" y1="4" x2="4" y2="12"/>
              </svg>
            </span>
            Raw source posts surface as fallback
          </div>
        </div>
      </div>

    </div>
  </div>

<script>if(window!==window.parent)document.body.classList.add("embedded");</script>
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (!d) return 0;
    return Math.max(
      d.scrollHeight, d.offsetHeight,
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0
    );
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) {
      window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', send);
  } else {
    send();
  }
  window.addEventListener('load', send);
  setTimeout(send, 50);
  setTimeout(send, 250);
  setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', send);
})();
</script>
</body>
</html>
