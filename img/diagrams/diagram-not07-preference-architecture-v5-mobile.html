<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOT-07 — Preference Architecture (mobile)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16; --card: #10121C; --elevated: #151722;
    --text-pri: #E0DFE4; --text-sec: rgba(224,223,228,0.6); --text-ter: rgba(224,223,228,0.4); --text-dim: rgba(224,223,228,0.2);
    --border-normal: rgba(224,223,228,0.07);
    --accent: #7FB5B0; --accent-dim: rgba(127,181,176,0.12);
    --red: #C47878;
    --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
    --glass-border: rgba(224,223,228,0.08);
    --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--canvas); display: flex; justify-content: center; padding: 0;
    font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased;
  }
  .diagram {
    width: 375px; background: var(--canvas); border-radius: 16px; overflow: hidden;
    padding: 16px 0; display: flex; flex-direction: column;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }

  /* ── Hover hint (mobile-only top strip) ── */
  .hover-hint {
    height: 24px; padding: 8px 16px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.06em; text-transform: uppercase;
    opacity: 0; animation: mount 0.5s var(--spring) forwards;
    animation-delay: calc(var(--ai, 0) * 60ms);
  }

  /* ── Transform area (vertical stack) ── */
  .transform-area {
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    position: relative;
  }
  .transform-area::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 280px 320px at 50% 50%, rgba(127,181,176,0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  .pref-side {
    display: flex; flex-direction: column; gap: 10px;
    width: 100%; position: relative; z-index: 1;
  }
  .pref-side-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .pref-side-label .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .pref-side-label.before { color: var(--red); }
  .pref-side-label.before .dot { background: var(--red); }
  .pref-side-label.after { color: var(--accent); }
  .pref-side-label.after .dot { background: var(--accent); }

  /* Image-screenshot wrapper */
  .pref-shot {
    aspect-ratio: 520 / 345; width: 100%;
    border-radius: 16px; overflow: hidden; position: relative;
    background: var(--card);
    opacity: 0; animation: mount 0.5s var(--spring) forwards;
    animation-delay: calc(var(--ai, 0) * 60ms);
  }
  .pref-shot img {
    position: absolute; max-width: none; display: block;
  }
  .pref-shot.before img {
    left: -0.02%; top: -124.06%; width: 100.04%; height: 327.83%;
  }
  .pref-shot.after img {
    left: 0; top: -227.62%; width: 100%; height: 327.69%;
  }

  /* Center transform arrow (just icon, no gradient lines on mobile) */
  .transform-arrow {
    display: flex; align-items: center; justify-content: center;
    padding: 4px 0; width: 100%; position: relative; z-index: 1;
  }

  /* ── Annotations (problem bar) ── */
  .annotations {
    padding: 4px 16px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .problem-bar {
    padding: 14px 20px;
    background: rgba(196,120,120,0.06); border-left: 3px solid rgba(196,120,120,0.4); border-radius: 10px;
    display: flex; align-items: center; gap: 12px;
    opacity: 0; animation: mount 0.5s var(--spring) forwards;
    animation-delay: calc(var(--ai, 0) * 60ms);
  }
  .problem-icon { width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .problem-text { font-size: 12px; color: var(--red); line-height: 1.5; }
  .problem-text strong { font-weight: 600; }

  @keyframes mount {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  /* ─ Allow diagram to fill its iframe at any width ─ */
  @media (max-width: 374px) {
    .diagram { width: 100%; padding: 12px 0; }
    .transform-area { padding: 12px; }
    .annotations { padding: 4px 12px 12px; }
  }

  /* Embed mode */
  body.embedded { padding: 0; min-height: auto; display: block; background: transparent; overflow: hidden; }
  body.embedded .diagram { width: 100%; max-width: none; border-radius: 0; }
</style>
</head>
<body>
<div class="diagram">

  <!-- Hover hint (mobile-only) -->
  <div class="hover-hint" style="--ai:1">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M6 1v4M4 3l2 2 2-2" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      <rect x="1" y="6" width="10" height="5" rx="1.5" stroke="currentColor" stroke-width="1" fill="none"/>
    </svg>
    Tap to compare
  </div>

  <!-- Transform area: vertical BEFORE → ARROW → AFTER -->
  <div class="transform-area">
    <!-- BEFORE -->
    <div class="pref-side">
      <div class="pref-side-label before"><span class="dot"></span>Before — Vague labels</div>
      <div class="pref-shot before" style="--ai:2">
        <img src="assets/not07-preferences-before.png" alt="Set community alerts — Off / Low / Frequent">
      </div>
    </div>

    <!-- Vertical arrow (icon only) -->
    <div class="transform-arrow">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="opacity:0.5; animation: breathe 2.5s ease-in-out infinite; transform: rotate(90deg);">
        <path d="M5 12h14M15 8l4 4-4 4" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- AFTER -->
    <div class="pref-side">
      <div class="pref-side-label after"><span class="dot"></span>After — Concrete labels</div>
      <div class="pref-shot after" style="--ai:3">
        <img src="assets/not07-preferences-after.png" alt="Concrete labels — Mute / All new posts / Popular posts / Off">
      </div>
    </div>
  </div>

  <!-- Annotations: problem bar -->
  <div class="annotations">
    <div class="problem-bar" style="--ai:4">
      <div class="problem-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="var(--red)" stroke-width="1.2" opacity="0.7"/>
          <path d="M8 4.5v4M8 11h.01" stroke="var(--red)" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="problem-text"><strong>Labels didn't map to behavior:</strong> Users saw "Off / Low / Frequent" — vague words built around engineering implementation, not user expectations. No one could predict their inbox from these settings.</p>
    </div>
  </div>

</div>
<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
<!-- diagram-height-poster v1 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (!d) return 0;
    return Math.max(
      d.scrollHeight, d.offsetHeight,
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0
    );
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) {
      window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', send);
  } else {
    send();
  }
  window.addEventListener('load', send);
  setTimeout(send, 50);
  setTimeout(send, 250);
  setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', send);
})();
</script>
</body>
</html>
