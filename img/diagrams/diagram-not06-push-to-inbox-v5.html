<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOT-06 — Push-to-Inbox Continuity (Before/After)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16; --card: #10121C; --elevated: #151722;
    --text-pri: #E0DFE4; --text-sec: rgba(224,223,228,0.6); --text-ter: rgba(224,223,228,0.4); --text-dim: rgba(224,223,228,0.2);
    --border-normal: rgba(224,223,228,0.07);
    --accent: #7FB5B0; --accent-dim: rgba(127,181,176,0.12);
    --red: #C47878; --resur: #C4B078; --new-seg: #8A9EC4;
    --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
    --glass-border: rgba(224,223,228,0.08);
    --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--canvas); display: flex; justify-content: center; padding: 40px;
    font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased;
  }
  .diagram {
    width: 760px; background: var(--canvas); border-radius: 16px; overflow: hidden;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }

  /* ── Before/After comparison ── */
  .comparison-strip {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    padding: 32px 48px; position: relative;
  }
  .comp-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px;
    padding: 18px; position: relative; overflow: visible;
    backdrop-filter: blur(8px);
    opacity: 0; animation: mount 0.5s var(--spring) forwards;
    animation-delay: calc(var(--li, 0) * 60ms);
  }
  .comp-card::before {
    content: ''; position: absolute; inset: 0;
    box-shadow: var(--glass-highlight); border-radius: 10px; pointer-events: none;
  }

  .comp-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .comp-label.before { color: var(--red); }
  .comp-label.after { color: var(--accent); }
  .comp-label .dot { width: 6px; height: 6px; border-radius: 50%; }
  .comp-label.before .dot { background: var(--red); }
  .comp-label.after .dot { background: var(--accent); }

  .comp-detail {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--text-dim); letter-spacing: 0.04em; margin-left: auto;
  }

  /* Mini inbox rows */
  .mini-rows { display: flex; flex-direction: column; gap: 6px; }
  .mini-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 7px;
    font-size: 12px;
    border: 1px solid transparent;
  }
  .mini-row.active-row { background: rgba(127,181,176,0.06); border-color: rgba(127,181,176,0.12); }
  .mini-row.gone { opacity: 0.15; text-decoration: line-through; }
  .mini-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .mini-dot.rec { background: var(--resur); }
  .mini-dot.notif { background: var(--accent); }
  .mini-dot.ghost { background: var(--text-dim); border: 1px dashed var(--text-dim); }
  .mini-text { color: var(--text-sec); flex: 1; font-size: 12px; }
  .mini-text.dim { color: var(--text-dim); }
  .mini-ts {
    font-family: 'JetBrains Mono', monospace; font-size: 8px;
    color: var(--text-dim); flex-shrink: 0;
  }
  .mini-tag {
    font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 4px; flex-shrink: 0;
  }
  .mini-tag.latest { background: rgba(196,176,120,0.12); color: var(--resur); }
  .mini-tag.kept { background: rgba(127,181,176,0.12); color: var(--accent); }
  .mini-tag.lost { background: rgba(196,120,120,0.12); color: var(--red); }

  @keyframes mount {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* iframe-width rule: collapse only at ≤480px */
  @media (max-width: 768px) {
    body { padding: 16px; }
    .comparison-strip { gap: 12px; padding: 20px 24px; }
  }
  @media (max-width: 480px) {
    .comparison-strip { gap: 10px; padding: 14px 12px; }
  }
  @media (max-width: 400px) {
    body { padding: 10px; }
    .comparison-strip { grid-template-columns: 1fr; gap: 24px; padding: 16px 20px; }
  }

  /* Embed mode */
  body.embedded { padding: 0; min-height: auto; display: block; background: transparent; overflow: hidden; }
  body.embedded .diagram { width: 100%; max-width: none; border-radius: 0; }
</style>
</head>
<body>
<div class="diagram">
  <div class="comparison-strip">
    <div class="comp-card" style="--li:1">
      <div class="comp-label before">
        <span class="dot"></span>Before &mdash; Latest only
        <span class="comp-detail">1 of 3 visible</span>
      </div>
      <div class="mini-rows">
        <div class="mini-row active-row">
          <span class="mini-dot rec"></span>
          <span class="mini-text">Trending in r/technology</span>
          <span class="mini-ts">2m</span>
          <span class="mini-tag latest">Latest</span>
        </div>
        <div class="mini-row gone">
          <span class="mini-dot ghost"></span>
          <span class="mini-text dim">Popular in r/design</span>
          <span class="mini-ts">1d</span>
          <span class="mini-tag lost">Gone</span>
        </div>
        <div class="mini-row gone">
          <span class="mini-dot ghost"></span>
          <span class="mini-text dim">Because you follow r/ux</span>
          <span class="mini-ts">3d</span>
          <span class="mini-tag lost">Gone</span>
        </div>
      </div>
    </div>
    <div class="comp-card" style="--li:2">
      <div class="comp-label after">
        <span class="dot"></span>After &mdash; History preserved
        <span class="comp-detail">3 of 3 visible</span>
      </div>
      <div class="mini-rows">
        <div class="mini-row active-row">
          <span class="mini-dot rec"></span>
          <span class="mini-text">Trending in r/technology</span>
          <span class="mini-ts">2m</span>
          <span class="mini-tag kept">New</span>
        </div>
        <div class="mini-row active-row">
          <span class="mini-dot rec"></span>
          <span class="mini-text">Popular in r/design</span>
          <span class="mini-ts">1d</span>
          <span class="mini-tag kept">Kept</span>
        </div>
        <div class="mini-row active-row">
          <span class="mini-dot rec"></span>
          <span class="mini-text">Because you follow r/ux</span>
          <span class="mini-ts">3d</span>
          <span class="mini-tag kept">Kept</span>
        </div>
      </div>
    </div>
  </div>
</div>
<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
<!-- diagram-height-poster v2 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (d) {
      var rect = d.getBoundingClientRect();
      if (rect.height > 0) return Math.ceil(rect.height);
    }
    return Math.max(
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0
    );
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', send);
  else send();
  window.addEventListener('load', send);
  setTimeout(send, 50); setTimeout(send, 250); setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', function () {
    requestAnimationFrame(send);
    setTimeout(send, 50);
  });
  // Respond to parent re-measure requests (fires on any iframe-width change)
  window.addEventListener('message', function (e) {
    if (e && e.data && e.data.type === 'request-diagram-height') {
      requestAnimationFrame(send);
    }
  });
})();
</script>
</body>
</html>
