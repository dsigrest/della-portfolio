<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUB-06a — Threshold Calibration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --canvas: #0A0C16;
      --elevated: #151722;
      --text-pri: #E0DFE4;
      --text-sec: rgba(224,223,228,0.6);
      --text-ter: rgba(224,223,228,0.4);
      --text-dim: rgba(224,223,228,0.2);
      --border: rgba(224,223,228,0.07);
      --accent: #7FB5B0;
      --accent-dim: rgba(127,181,176,0.12);
      --red: #C47878;
      --resur: #C4B078;
      --warm: #D4A574;
      --blue: #8A9EC4;
      --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
      --glass-border: rgba(224,223,228,0.08);
      --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #08090F;
      display: flex;
      justify-content: center;
      padding: 40px;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      align-items: flex-start;
    }

    body.embedded {
      padding: 0;
      min-height: auto;
      display: block;
      background: transparent;
      overflow: hidden;
      align-items: initial;
    }

    .diagram {
      width: 760px;
      background: var(--canvas);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      padding: 36px 48px;
    }

    body.embedded .diagram {
      width: 100%;
      border-radius: 0;
    }

    .diagram::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 60% 40%, rgba(127,181,176,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .diagram > * {
      position: relative;
      z-index: 1;
    }

    .chart-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-highlight);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      opacity: 0;
      animation: reveal-up 0.6s ease-out 0.1s forwards;
    }

    .gradient-line {
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--warm), var(--resur), var(--blue), var(--accent));
      border-radius: 2px;
      margin-bottom: 20px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .chart-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-pri);
    }

    .legend {
      display: flex;
      gap: 16px;
      font-size: 10px;
      color: var(--text-sec);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 8px;
      height: 8px;
      border-radius: 1px;
    }

    .chart-container {
      height: 260px;
      margin: 0;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    .detail-cards {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .detail-card {
      flex: 0 1 calc(20% - 7px);
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      /* Workstream A: border-radius 10→12 (prevailing pattern) */
      border-radius: 12px;
      padding: 10px;
      position: relative;
      opacity: 0;
      animation: reveal-up 0.5s ease-out forwards;
    }

    .detail-card:nth-child(1) { animation-delay: 0.2s; }
    .detail-card:nth-child(2) { animation-delay: 0.3s; }
    .detail-card:nth-child(3) { animation-delay: 0.4s; }
    .detail-card:nth-child(4) { animation-delay: 0.5s; }
    .detail-card:nth-child(5) { animation-delay: 0.6s; }

    .detail-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      /* Workstream A: match card corner-radius 12 */
      border-radius: 12px 12px 0 0;
    }

    .detail-icon {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      margin-bottom: 6px;
      border: 1px solid;
    }

    .detail-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
      opacity: 0.6;
    }

    .detail-title {
      font-size: 9px;
      color: var(--text-pri);
      font-weight: 500;
      line-height: 1.2;
    }

    .detail-card[data-stage="s1"] { color: var(--red); }
    .detail-card[data-stage="s1"]::before { background: var(--red); }
    .detail-card[data-stage="s1"] .detail-icon { background: rgba(196,120,120,0.15); border-color: rgba(196,120,120,0.3); }

    .detail-card[data-stage="s2"] { color: var(--warm); }
    .detail-card[data-stage="s2"]::before { background: var(--warm); }
    .detail-card[data-stage="s2"] .detail-icon { background: rgba(212,165,116,0.15); border-color: rgba(212,165,116,0.3); }

    .detail-card[data-stage="s3"] { color: var(--resur); }
    .detail-card[data-stage="s3"]::before { background: var(--resur); }
    .detail-card[data-stage="s3"] .detail-icon { background: rgba(196,176,120,0.15); border-color: rgba(196,176,120,0.3); }

    .detail-card[data-stage="s4"] { color: var(--blue); }
    .detail-card[data-stage="s4"]::before { background: var(--blue); }
    .detail-card[data-stage="s4"] .detail-icon { background: rgba(138,158,196,0.15); border-color: rgba(138,158,196,0.3); }

    .detail-card[data-stage="s5"] { color: var(--accent); }
    .detail-card[data-stage="s5"]::before { background: var(--accent); }
    .detail-card[data-stage="s5"] .detail-icon { background: rgba(127,181,176,0.15); border-color: rgba(127,181,176,0.3); }

    .hint-text {
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 500;
    }

    @keyframes reveal-up {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .chart-card, .detail-card {
        animation: none;
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .diagram { padding: 28px 20px; }
      .chart-card { padding: 20px; margin-bottom: 20px; }
      .chart-container { height: auto; aspect-ratio: 640 / 280; }
      .chart-header { flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
      .legend { gap: 12px; flex-wrap: wrap; }
      .detail-card { flex: 0 1 calc(33.333% - 6px); }
    }
    @media (max-width: 480px) {
      .diagram { padding: 24px 16px; }
      .chart-card { padding: 16px; }
      /* Rebalance hierarchy: bigger chart share by shrinking surrounding elements. */
      .detail-card { flex: 0 1 calc(50% - 4px); padding: 8px; }
      .detail-title { font-size: 8px; }
      .detail-label { font-size: 9px; }
      .detail-icon { width: 20px; height: 20px; margin-bottom: 4px; }
      .chart-container svg text { font-size: 16px; }
      .chart-title { font-size: 12px; }
      .legend { font-size: 9px; gap: 10px; }
      .hint-text { display: none; }
    }
    @media (max-width: 320px) {
      .chart-container svg text { font-size: 19px; }
      .detail-cards { gap: 6px; }
      .detail-card { padding: 6px; }
    }
  </style>
</head>
<body>
  <div class="diagram">
    <div class="chart-card">
      <div class="gradient-line"></div>
      <div class="chart-header">
        <div class="chart-title">Community Survival by Lifecycle Stage</div>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-swatch" style="background: var(--red);"></div>
            <span>Drop-off zone</span>
          </div>
          <div class="legend-item">
            <div class="legend-swatch" style="background: var(--accent);"></div>
            <span>Survival threshold</span>
          </div>
        </div>
      </div>
      <div class="chart-container">
        <svg viewBox="0 0 640 280" preserveAspectRatio="xMidYMid meet">
          <!-- Grid lines -->
          <line x1="40" y1="40" x2="600" y2="40" stroke="var(--border)" stroke-dasharray="4,4" opacity="0.3"/>
          <line x1="40" y1="90" x2="600" y2="90" stroke="var(--border)" stroke-dasharray="4,4" opacity="0.2"/>
          <line x1="40" y1="140" x2="600" y2="140" stroke="var(--border)" stroke-dasharray="4,4" opacity="0.2"/>
          <line x1="40" y1="190" x2="600" y2="190" stroke="var(--border)" stroke-dasharray="4,4" opacity="0.2"/>
          <line x1="40" y1="240" x2="600" y2="240" stroke="var(--border)" stroke-dasharray="4,4" opacity="0.3"/>

          <!-- Y-axis labels -->
          <text x="20" y="45" font-size="9" fill="rgba(224,223,228,0.2)" text-anchor="end">High</text>
          <text x="20" y="245" font-size="9" fill="rgba(224,223,228,0.2)" text-anchor="end">Low</text>

          <!-- Drop-off zone bars (red tinted) -->
          <rect x="65" y="180" width="36" height="60" fill="var(--red)" opacity="0.15"/>
          <rect x="155" y="200" width="36" height="40" fill="var(--red)" opacity="0.12"/>
          <rect x="245" y="215" width="36" height="25" fill="var(--red)" opacity="0.1"/>
          <rect x="335" y="225" width="36" height="15" fill="var(--red)" opacity="0.08"/>
          <rect x="425" y="235" width="36" height="5" fill="var(--red)" opacity="0.06"/>

          <!-- Survival threshold curve -->
          <path d="M 83 60 L 173 110 L 263 160 L 353 190 L 443 220" 
                stroke="var(--accent)" stroke-width="2" fill="none" stroke-dasharray="4,4"/>

          <!-- Curve control points -->
          <circle cx="83" cy="60" r="3" fill="var(--accent)" opacity="0.7"/>
          <circle cx="173" cy="110" r="3" fill="var(--accent)" opacity="0.6"/>
          <circle cx="263" cy="160" r="3" fill="var(--accent)" opacity="0.5"/>
          <circle cx="353" cy="190" r="3" fill="var(--accent)" opacity="0.4"/>
          <circle cx="443" cy="220" r="3" fill="var(--accent)" opacity="0.3"/>

          <!-- Stage labels -->
          <text x="83" y="265" font-size="9" font-weight="700" fill="var(--red)" text-anchor="middle">Creation</text>
          <text x="173" y="265" font-size="9" font-weight="700" fill="var(--warm)" text-anchor="middle">Content</text>
          <text x="263" y="265" font-size="9" font-weight="700" fill="var(--resur)" text-anchor="middle">Growth</text>
          <text x="353" y="265" font-size="9" font-weight="700" fill="var(--blue)" text-anchor="middle">Mod Team</text>
          <text x="443" y="265" font-size="9" font-weight="700" fill="var(--accent)" text-anchor="middle">Sustained</text>

          <!-- Annotations -->
          <text x="83" y="25" font-size="8" fill="var(--red)" text-anchor="middle" opacity="0.7">Highest</text>
          <text x="173" y="30" font-size="8" fill="var(--warm)" text-anchor="middle" opacity="0.6">High</text>
          <text x="263" y="35" font-size="8" fill="var(--resur)" text-anchor="middle" opacity="0.5">Medium</text>
          <!-- "Most fail here" annotation inside pill (matches Figma x=914 frame 678:822) -->
          <rect x="48" y="92" width="84" height="16" rx="8" fill="var(--red)" opacity="0.14"/>
          <text x="90" y="100" font-size="8" fill="var(--red)" opacity="0.9" text-anchor="middle" dominant-baseline="middle">Most fail here</text>
        </svg>
      </div>
    </div>

    <div class="detail-cards">
      <div class="detail-card" data-stage="s1">
        <div class="detail-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3c-4.97 0-9 3.58-9 8 0 2.21 1.79 4 4 4h1.5c.83 0 1.5.67 1.5 1.5v.5c0 1.38 1.12 2.5 2.5 2.5h.5c4.42 0 8-3.58 8-8 0-4.42-4.03-8.5-9-8.5z"/>
            <circle cx="7.5" cy="11" r="0.8"/>
            <circle cx="10" cy="7.5" r="0.8"/>
            <circle cx="15" cy="7.5" r="0.8"/>
            <circle cx="17" cy="11" r="0.8"/>
          </svg>
        </div>
        <div class="detail-label">S1</div>
        <div class="detail-title">Visual identity + category</div>
      </div>
      <div class="detail-card" data-stage="s2">
        <div class="detail-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 3l4 4L9 19H5v-4L17 3z"/>
            <path d="M14 6l4 4"/>
          </svg>
        </div>
        <div class="detail-label">S2</div>
        <div class="detail-title">Content in first week</div>
      </div>
      <div class="detail-card" data-stage="s3">
        <div class="detail-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 17 9 11 13 15 21 7"/>
            <polyline points="15 7 21 7 21 13"/>
          </svg>
        </div>
        <div class="detail-label">S3</div>
        <div class="detail-title">Initial member growth</div>
      </div>
      <div class="detail-card" data-stage="s4">
        <div class="detail-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="9" r="3"/>
            <circle cx="16" cy="10.5" r="2.5"/>
            <path d="M3 19.5c0-3 2.7-5 6-5s6 2 6 5"/>
            <path d="M15 19.5c0-2 1.6-3.5 3.5-3.5s3.5 1.5 3.5 3.5"/>
          </svg>
        </div>
        <div class="detail-label">S4</div>
        <div class="detail-title">Mod team formation</div>
      </div>
      <div class="detail-card" data-stage="s5">
        <div class="detail-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 4v4M12 16v4M4 12h4M16 12h4"/>
            <path d="M12 8c0 2.5 1.5 4 4 4-2.5 0-4 1.5-4 4 0-2.5-1.5-4-4-4 2.5 0 4-1.5 4-4z"/>
          </svg>
        </div>
        <div class="detail-label">S5</div>
        <div class="detail-title">Sustained engagement</div>
      </div>
    </div>

    <div class="hint-text">Hover each stage for threshold details</div>
  </div>

  <script>
    if (window !== window.parent) {
      document.body.classList.add('embedded');
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.animationPlayState = 'running';
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.chart-card, .detail-card').forEach(el => {
      observer.observe(el);
    });
  </script>
</body>
</html>
