<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NOT-E6 — Butterfly Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<style>
  :root {
    --canvas: #0A0C16; --card: #10121C; --elevated: #151722;
    --text-pri: #E0DFE4; --text-sec: rgba(224,223,228,0.6); --text-ter: rgba(224,223,228,0.4); --text-dim: rgba(224,223,228,0.2);
    --accent: #7FB5B0; --accent-dim: rgba(127,181,176,0.12);
    --gold: #C4B078; --red: #C47878; --blue: #8A9EC4; --warm: #D4A574;
    --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
    --glass-border: rgba(224,223,228,0.08);
    --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #08090F; display: flex; justify-content: center; padding: 40px;
    font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased;
  }
  .diagram {
    width: 760px; background: var(--canvas); border-radius: 16px; overflow: hidden; position: relative;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }

  /* ── Title ── */
  .title-area {
    padding: 48px 48px 0;
    opacity: 0; animation: mount 0.5s var(--spring) forwards;
  }
  .label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent); opacity: 0.8; margin-bottom: 8px;
  }
  h1 {
    font-size: 28px; font-weight: 700; color: var(--text-pri); letter-spacing: -0.025em;
    margin-bottom: 8px; line-height: 1.15;
  }
  .subtitle { font-size: 13px; color: var(--text-sec); line-height: 1.55; }

  /* ── Legend ── */
  .legend {
    padding: 16px 48px 0;
    display: flex; gap: 20px;
    opacity: 0; animation: mount 0.5s var(--spring) 0.05s forwards;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-sec);
  }
  .legend-bar {
    width: 16px; height: 10px; border-radius: 2px;
  }
  .legend-bar.sent { opacity: 0.85; }
  .legend-bar.read { opacity: 0.35; }

  /* ── Chart ── */
  .chart-area {
    padding: 24px 48px 0; position: relative;
    opacity: 0; animation: mount 0.5s var(--spring) 0.1s forwards;
  }
  .chart-area::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 400px 200px at 50% 50%, rgba(127,181,176,0.025) 0%, transparent 70%);
    pointer-events: none;
  }
  .chart-container { position: relative; width: 100%; }
  .chart-svg { width: 100%; height: auto; overflow: visible; }

  /* Side labels */
  .side-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* Metric labels */
  .metric-label {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    fill: var(--text-dim);
  }

  /* Bars */
  .bar-group { cursor: default; }
  .bar-group rect { transition: opacity 0.25s ease; }
  .bar-group:hover .bar-sent { opacity: 1 !important; }
  .bar-group:hover .bar-read { opacity: 0.55 !important; }

  /* Notif card mockups on baseline */
  .notif-card {
    font-family: 'Inter', sans-serif;
  }
  .notif-card-bg {
    fill: var(--card); stroke: var(--glass-border); stroke-width: 1; rx: 6;
  }
  .notif-card-icon {
    font-size: 10px;
  }
  .notif-card-title {
    font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 600;
  }
  .notif-card-sub {
    font-family: 'Inter', sans-serif; font-size: 8px;
    fill: var(--text-dim);
  }

  /* Hover value labels */
  .bar-val {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
    opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
  }
  .bar-group:hover .bar-val { opacity: 1; }

  /* ── Insight bar ── */
  .insight-bar {
    margin: 24px 48px 48px; padding: 20px 24px;
    background: rgba(127,181,176,0.06);
    border-left: 3px solid rgba(127,181,176,0.4);
    border-radius: 10px;
    display: flex; align-items: flex-start; gap: 14px;
    opacity: 0; animation: mount 0.5s var(--spring) 0.2s forwards;
  }
  .insight-icon { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; }
  .insight-text { font-size: 13px; color: var(--text-sec); line-height: 1.55; }
  .insight-text strong { color: var(--accent); font-weight: 600; }

  @keyframes mount { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
/* Embed mode: strip body chrome when loaded in iframe */
  body.embedded {
    padding: 0;
    min-height: auto;
    display: block;
    background: transparent;
    overflow: hidden;
    align-items: initial;
  }
  body.embedded .diagram {
    width: 100%;
    border-radius: 0;
  }
</style>
</head>
<body>
<div class="diagram">

<div class="legend">
<div class="legend-item"><div class="legend-bar sent" style="background: var(--text-pri);"></div> Sent / received</div>
<div class="legend-item"><div class="legend-bar read" style="background: var(--text-pri);"></div> Read / clicked</div>
</div>
<div class="chart-area">
<div class="chart-container">
<!--
        Layout: viewBox 0 0 664 480
        Baseline at y=240 (center)
        Sent bars grow UP from y=240
        Read bars grow DOWN from y=240
        4 notification types evenly spaced
        Each type: 2 bars (sent + read) + notif card mockup at baseline
        Colors per type: Comment Reply = teal, Upvote = gold, Trending = blue, Following = warm
      -->
<svg class="chart-svg" preserveaspectratio="xMidYMid meet" viewbox="0 0 664 480">
<!-- Baseline -->
<line stroke="rgba(224,223,228,0.1)" stroke-width="1" x1="60" x2="620" y1="240" y2="240"></line>
<!-- Side labels -->
<text class="side-label" fill="rgba(224,223,228,0.25)" x="16" y="120">SENT</text>
<text class="side-label" fill="rgba(224,223,228,0.25)" x="16" y="370">READ</text>
<!-- Grid hints -->
<line stroke="rgba(224,223,228,0.04)" stroke-dasharray="4 6" stroke-width="1" x1="60" x2="620" y1="120" y2="120"></line>
<line stroke="rgba(224,223,228,0.04)" stroke-dasharray="4 6" stroke-width="1" x1="60" x2="620" y1="360" y2="360"></line>
<!-- Scale labels -->
<text class="metric-label" x="638" y="124">High</text>
<text class="metric-label" x="638" y="244">0</text>
<text class="metric-label" x="638" y="364">High</text>
<!-- ═══ Comment Reply ═══ -->
<g class="bar-group">
<!-- Sent bar (up from baseline) — high volume -->
<rect class="bar-sent" fill="#7FB5B0" height="150" opacity="0.8" rx="4" width="56" x="96" y="90"></rect>
<!-- Read bar (down from baseline) — high engagement -->
<rect class="bar-read" fill="#7FB5B0" height="120" opacity="0.35" rx="4" width="56" x="96" y="240"></rect>
<!-- Value labels on hover -->
<text class="bar-val" fill="#7FB5B0" text-anchor="middle" x="124" y="82">2.4M sent</text>
<text class="bar-val" fill="#7FB5B0" text-anchor="middle" x="124" y="374">68% read</text>
</g>
<!-- Notif card mockup — Comment Reply -->
<g class="notif-card" transform="translate(80, 226)">
<rect class="notif-card-bg" height="28" rx="6" width="88" x="0" y="0"></rect>
<text class="notif-card-title" fill="#7FB5B0" x="10" y="12">💬</text>
<text class="notif-card-title" fill="var(--text-sec)" x="26" y="13">Reply</text>
<text class="notif-card-sub" x="26" y="23">comment reply</text>
</g>
<!-- ═══ Upvote ═══ -->
<g class="bar-group">
<!-- Sent bar — highest volume -->
<rect class="bar-sent" fill="#C4B078" height="180" opacity="0.8" rx="4" width="56" x="236" y="60"></rect>
<!-- Read bar — lower engagement -->
<rect class="bar-read" fill="#C4B078" height="72" opacity="0.35" rx="4" width="56" x="236" y="240"></rect>
<text class="bar-val" fill="#C4B078" text-anchor="middle" x="264" y="52">4.1M sent</text>
<text class="bar-val" fill="#C4B078" text-anchor="middle" x="264" y="326">31% read</text>
</g>
<!-- Notif card mockup — Upvote -->
<g class="notif-card" transform="translate(220, 226)">
<rect class="notif-card-bg" height="28" rx="6" width="88" x="0" y="0"></rect>
<text class="notif-card-title" fill="#C4B078" x="10" y="12">⬆</text>
<text class="notif-card-title" fill="var(--text-sec)" x="26" y="13">Upvote</text>
<text class="notif-card-sub" x="26" y="23">post upvoted</text>
</g>
<!-- ═══ Trending ═══ -->
<g class="bar-group">
<!-- Sent bar — medium volume -->
<rect class="bar-sent" fill="#8A9EC4" height="130" opacity="0.8" rx="4" width="56" x="376" y="110"></rect>
<!-- Read bar — moderate engagement -->
<rect class="bar-read" fill="#8A9EC4" height="90" opacity="0.35" rx="4" width="56" x="376" y="240"></rect>
<text class="bar-val" fill="#8A9EC4" text-anchor="middle" x="404" y="102">1.8M sent</text>
<text class="bar-val" fill="#8A9EC4" text-anchor="middle" x="404" y="344">42% read</text>
</g>
<!-- Notif card mockup — Trending -->
<g class="notif-card" transform="translate(360, 226)">
<rect class="notif-card-bg" height="28" rx="6" width="88" x="0" y="0"></rect>
<text class="notif-card-title" fill="#8A9EC4" x="10" y="12">🔥</text>
<text class="notif-card-title" fill="var(--text-sec)" x="26" y="13">Trending</text>
<text class="notif-card-sub" x="26" y="23">trending post</text>
</g>
<!-- ═══ Following ═══ -->
<g class="bar-group">
<!-- Sent bar — lower volume -->
<rect class="bar-sent" fill="#D4A574" height="100" opacity="0.8" rx="4" width="56" x="516" y="140"></rect>
<!-- Read bar — highest engagement rate -->
<rect class="bar-read" fill="#D4A574" height="108" opacity="0.35" rx="4" width="56" x="516" y="240"></rect>
<text class="bar-val" fill="#D4A574" text-anchor="middle" x="544" y="132">0.9M sent</text>
<text class="bar-val" fill="#D4A574" text-anchor="middle" x="544" y="362">54% read</text>
</g>
<!-- Notif card mockup — Following -->
<g class="notif-card" transform="translate(500, 226)">
<rect class="notif-card-bg" height="28" rx="6" width="88" x="0" y="0"></rect>
<text class="notif-card-title" fill="#D4A574" x="10" y="12">👤</text>
<text class="notif-card-title" fill="var(--text-sec)" x="26" y="13">Following</text>
<text class="notif-card-sub" x="26" y="23">user posted</text>
</g>
<!-- Type labels below -->
<text class="metric-label" style="font-size: 11px; fill: rgba(224,223,228,0.4);" text-anchor="middle" x="124" y="430">Comment reply</text>
<text class="metric-label" style="font-size: 11px; fill: rgba(224,223,228,0.4);" text-anchor="middle" x="264" y="430">Upvote</text>
<text class="metric-label" style="font-size: 11px; fill: rgba(224,223,228,0.4);" text-anchor="middle" x="404" y="430">Trending</text>
<text class="metric-label" style="font-size: 11px; fill: rgba(224,223,228,0.4);" text-anchor="middle" x="544" y="430">Following</text>
<!-- Efficiency arrows — connecting sent to read ratio -->
<g opacity="0.15">
<path d="M152,180 Q168,240 152,300" fill="none" stroke="#7FB5B0" stroke-dasharray="3 3" stroke-width="1"></path>
<path d="M292,180 Q308,240 292,290" fill="none" stroke="#C4B078" stroke-dasharray="3 3" stroke-width="1"></path>
<path d="M432,200 Q448,240 432,310" fill="none" stroke="#8A9EC4" stroke-dasharray="3 3" stroke-width="1"></path>
<path d="M572,200 Q588,240 572,320" fill="none" stroke="#D4A574" stroke-dasharray="3 3" stroke-width="1"></path>
</g>
</svg>
</div>
</div>
<div class="insight-bar">
<svg class="insight-icon" fill="none" viewbox="0 0 20 20">
<path d="M10 2L12.09 7.26L18 8.27L14 12.14L14.81 18.02L10 15.27L5.19 18.02L6 12.14L2 8.27L7.91 7.26L10 2Z" fill="none" stroke="#7FB5B0" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<div class="insight-text">
<strong>Comment replies have the highest read rate (68%)</strong> despite moderate volume — while upvotes dominate volume but see only 31% reads. This inversion reveals which types create genuine value vs. notification fatigue.
    </div>
</div>
</div>
<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
</body>
</html>
