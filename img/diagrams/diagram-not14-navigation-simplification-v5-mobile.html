<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOT-14 Navigation Simplification (Mobile)</title>
  <style>
    :root {
      --canvas: #0A0C16; --card: #10121C; --elevated: #151722;
      --text-pri: #E0DFE4; --text-sec: rgba(224,223,228,0.6); --text-ter: rgba(224,223,228,0.4); --text-dim: rgba(224,223,228,0.2);
      --border-normal: rgba(224,223,228,0.07);
      --accent: #7FB5B0; --accent-dim: rgba(127,181,176,0.12);
      --red: #C47878;
      --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
      --glass-border: rgba(224,223,228,0.08);
      --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--canvas);
      color: var(--text-sec);
      padding: 16px;
    }

    body.embedded { padding: 0; min-height: auto; display: block; background: transparent; overflow: hidden; }
    body.embedded .diagram { width: 100%; max-width: none; border-radius: 0; }

    .diagram {
      background: var(--canvas);
      border-radius: 16px;
      padding: 24px 16px;
      max-width: 100%;
    }

    .comparison {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: 5px;
      position: relative;
      width: 100%;
    }

    .col-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1;
    }
    .col.before .col-label { color: var(--red); }
    .col.after .col-label { color: var(--accent); }

    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .col.before .dot { background: var(--red); }
    .col.after .dot { background: var(--accent); }

    .spacer { height: 14px; }

    .screenshot {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
      padding: 8px;
    }
    .col.before .screenshot { height: 44px; }
    .col.after .screenshot { height: 44px; }

    .mock {
      flex: 1;
      min-width: 0;
      aspect-ratio: 306 / 43;
      border: 6px solid #fff;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      background: #fff;
    }
    .col.after .mock { aspect-ratio: 306 / 44; }

    .mock img {
      position: absolute;
      width: 100%;
      height: auto;
      left: 0;
      object-fit: cover;
      object-position: top center;
    }
    .col.before .mock img { height: 1540.04%; top: -1387.2%; }
    .col.after  .mock img { height: 1512.01%; top: -1368.18%; }

    .spacer-bottom { height: 6px; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .col { animation: fadeSlideIn 0.6s ease-out forwards; }
    .col:nth-child(2) { animation-delay: 0.1s; }

    @media (max-width: 400px) {
      .col-label { font-size: 9px; }
      .spacer { height: 10px; }
    }
  </style>
</head>
<body>
  <div class="diagram">
    <div class="comparison">
      <div class="col before">
        <div class="col-label">
          <div class="dot"></div>
          <span>Before &mdash; 5 tab layout</span>
        </div>
        <div class="spacer"></div>
        <div class="screenshot">
          <div class="mock">
            <img src="assets/not14-legacy-nav.png" alt="Legacy 5-tab navigation">
          </div>
        </div>
        <div class="spacer-bottom"></div>
      </div>
      <div class="col after">
        <div class="col-label">
          <div class="dot"></div>
          <span>After &mdash; 3 tab model</span>
        </div>
        <div class="spacer"></div>
        <div class="screenshot">
          <div class="mock">
            <img src="assets/not14-unified-nav.png" alt="Unified 3-tab navigation">
          </div>
        </div>
        <div class="spacer-bottom"></div>
      </div>
    </div>
  </div>

<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
<!-- diagram-height-poster v1 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (!d) return 0;
    return Math.max(d.scrollHeight, d.offsetHeight,
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0);
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', send);
  else send();
  window.addEventListener('load', send);
  setTimeout(send, 50); setTimeout(send, 250); setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', send);
})();
</script>
</body>
</html>
