<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOT-E3 — Strategic Pillars</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16; --card: #10121C;
    --text-pri: #E0DFE4; --text-sec: rgba(224,223,228,0.6); --text-ter: rgba(224,223,228,0.4); --text-dim: rgba(224,223,228,0.2);
    --accent: #7FB5B0; --accent-dim: rgba(127,181,176,0.12);
    --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
    --glass-border: rgba(224,223,228,0.08);
    --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--canvas); display: flex; justify-content: center; padding: 40px;
    font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased;
  }
  .diagram {
    width: 760px; background: var(--canvas); border-radius: 16px; overflow: hidden; position: relative;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }

  /* ── Title ── */
  .title-area {
    padding: 48px 48px 0;
    opacity: 0; animation: mount 0.5s var(--spring) forwards;
  }
  .label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent); opacity: 0.8; margin-bottom: 8px;
  }
  h1 {
    font-size: 28px; font-weight: 700; color: var(--text-pri); letter-spacing: -0.025em;
    line-height: 1.15;
  }

  /* ── Pillars row ── */
  .pillars {
    padding: 32px 48px 48px;
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    opacity: 0; animation: mount 0.5s var(--spring) 0.15s forwards;
  }

  .pillar {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 12px; padding: 28px 20px;
    text-align: center; position: relative;
    backdrop-filter: blur(8px);
    transition: transform 0.35s var(--spring), border-color 0.3s ease;
    cursor: default;
  }
  .pillar::before {
    content: ''; position: absolute; inset: 0;
    box-shadow: var(--glass-highlight); border-radius: 12px; pointer-events: none;
  }
  .pillar:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: rgba(127,181,176,0.18);
  }
  .pillar:nth-child(1) { animation: mountPillar 0.5s var(--spring) 0.25s forwards; opacity: 0; }
  .pillar:nth-child(2) { animation: mountPillar 0.5s var(--spring) 0.35s forwards; opacity: 0; }
  .pillar:nth-child(3) { animation: mountPillar 0.5s var(--spring) 0.45s forwards; opacity: 0; }

  /* ── Icon zone — SHR-05 ambient illustration style ── */
  .icon-zone {
    width: 56px; height: 56px; margin: 0 auto 16px;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .icon-zone svg {
    position: relative; z-index: 1;
  }

  /* Pillar 1: Build habits — expanding circle pulse (compounding) */
  .pulse-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid var(--accent);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    opacity: 0; width: 20px; height: 20px;
  }
  .pulse-ring:nth-child(1) { animation: pulseOut 3s ease-out 0s infinite; }
  .pulse-ring:nth-child(2) { animation: pulseOut 3s ease-out 0.7s infinite; }
  .pulse-ring:nth-child(3) { animation: pulseOut 3s ease-out 1.4s infinite; }
  @keyframes pulseOut {
    0% { width: 20px; height: 20px; opacity: 0.5; }
    100% { width: 56px; height: 56px; opacity: 0; }
  }

  /* Pillar 2: Enable curation — sliding bars (filtering/adjusting) */
  .slider-bar {
    position: absolute; height: 1.5px; background: var(--accent);
    left: 50%; transform: translateX(-50%); opacity: 0;
  }
  .slider-bar:nth-child(1) { top: 12px; animation: sliderSlide 2.8s ease-in-out 0s infinite; }
  .slider-bar:nth-child(2) { top: 22px; animation: sliderSlide 2.8s ease-in-out 0.4s infinite; }
  .slider-bar:nth-child(3) { top: 32px; animation: sliderSlide 2.8s ease-in-out 0.8s infinite; }
  @keyframes sliderSlide {
    0%, 100% { width: 0; opacity: 0; }
    20% { width: 36px; opacity: 0.4; }
    50% { width: 24px; opacity: 0.35; }
    80% { width: 36px; opacity: 0.4; }
    100% { width: 0; opacity: 0; }
  }

  /* Pillar 3: Create focus — converging dots (reducing to signal) */
  .focus-dot {
    position: absolute; width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent); opacity: 0;
  }
  .focus-dot:nth-child(1) { animation: converge1 3s ease-in-out 0s infinite; }
  .focus-dot:nth-child(2) { animation: converge2 3s ease-in-out 0.3s infinite; }
  .focus-dot:nth-child(3) { animation: converge3 3s ease-in-out 0.6s infinite; }
  .focus-dot:nth-child(4) { animation: converge4 3s ease-in-out 0.9s infinite; }

  @keyframes converge1 {
    0% { top: 4px; left: 8px; opacity: 0; }
    30% { opacity: 0.6; }
    70% { top: 24px; left: 26px; opacity: 0.6; }
    100% { top: 24px; left: 26px; opacity: 0; }
  }
  @keyframes converge2 {
    0% { top: 4px; right: 8px; opacity: 0; }
    30% { opacity: 0.6; }
    70% { top: 24px; right: 22px; opacity: 0.6; }
    100% { top: 24px; right: 22px; opacity: 0; }
  }
  @keyframes converge3 {
    0% { bottom: 4px; left: 8px; opacity: 0; }
    30% { opacity: 0.6; }
    70% { bottom: 16px; left: 26px; opacity: 0.6; }
    100% { bottom: 16px; left: 26px; opacity: 0; }
  }
  @keyframes converge4 {
    0% { bottom: 4px; right: 8px; opacity: 0; }
    30% { opacity: 0.6; }
    70% { bottom: 16px; right: 22px; opacity: 0.6; }
    100% { bottom: 16px; right: 22px; opacity: 0; }
  }

  /* ── Card text ── */
  .pillar-title {
    font-size: 17px; font-weight: 700; color: var(--text-pri);
    margin-bottom: 8px; letter-spacing: -0.01em;
  }
  .pillar-desc {
    font-size: 13px; color: var(--text-sec); line-height: 1.55;
  }

  @keyframes mount {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes mountPillar {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Embed mode — Della call 2026-04-29: remove the diagram's container background
     so the three pillar cards sit on the case study canvas directly. */
  body.embedded { padding: 0; min-height: auto; display: block; background: transparent; overflow: hidden; }
  body.embedded .diagram { border-radius: 0; background: transparent; background-image: none; }
</style>
</head>
<body>
<div class="diagram">

  <div class="pillars">

    <!-- Pillar 1: Build Habits -->
    <div class="pillar">
      <div class="icon-zone">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <!-- Loop/cycle icon -->
          <path d="M20.5 8.5A8.5 8.5 0 0 0 7.5 7" stroke="#7FB5B0" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M7.5 19.5A8.5 8.5 0 0 0 20.5 21" stroke="#7FB5B0" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M10 5L7.5 7L10 9" stroke="#7FB5B0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18 19L20.5 21L18 23" stroke="#7FB5B0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="pillar-title">Build habits</div>
      <div class="pillar-desc">Engagement loops that compound over time</div>
    </div>

    <!-- Pillar 2: Enable Curation -->
    <div class="pillar">
      <div class="icon-zone">
        <div class="slider-bar"></div>
        <div class="slider-bar"></div>
        <div class="slider-bar"></div>
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <!-- Sliders icon -->
          <line x1="5" y1="9" x2="23" y2="9" stroke="#7FB5B0" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="14" x2="23" y2="14" stroke="#7FB5B0" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="19" x2="23" y2="19" stroke="#7FB5B0" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="10" cy="9" r="2.5" fill="#0A0C16" stroke="#7FB5B0" stroke-width="1.5"/>
          <circle cx="17" cy="14" r="2.5" fill="#0A0C16" stroke="#7FB5B0" stroke-width="1.5"/>
          <circle cx="12" cy="19" r="2.5" fill="#0A0C16" stroke="#7FB5B0" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="pillar-title">Enable curation</div>
      <div class="pillar-desc">Customized feeds surface the highest-signal content</div>
    </div>

    <!-- Pillar 3: Create Focus -->
    <div class="pillar">
      <div class="icon-zone">
        <div class="focus-dot"></div>
        <div class="focus-dot"></div>
        <div class="focus-dot"></div>
        <div class="focus-dot"></div>
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <!-- Target/crosshair icon -->
          <circle cx="14" cy="14" r="9" stroke="#7FB5B0" stroke-width="1.5"/>
          <circle cx="14" cy="14" r="5" stroke="#7FB5B0" stroke-width="1.5"/>
          <circle cx="14" cy="14" r="1.5" fill="#7FB5B0"/>
          <line x1="14" y1="2" x2="14" y2="6" stroke="#7FB5B0" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="14" y1="22" x2="14" y2="26" stroke="#7FB5B0" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="14" x2="6" y2="14" stroke="#7FB5B0" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="22" y1="14" x2="26" y2="14" stroke="#7FB5B0" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="pillar-title">Create focus</div>
      <div class="pillar-desc">Reduced noise means higher quality time on platform</div>
    </div>

  </div>

</div>
<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
<!-- diagram-height-poster v1 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (!d) return 0;
    return Math.max(
      d.scrollHeight, d.offsetHeight,
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0
    );
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) {
      window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', send);
  } else {
    send();
  }
  window.addEventListener('load', send);
  // Re-send to catch font swaps, image loads, animations.
  setTimeout(send, 50);
  setTimeout(send, 250);
  setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', send);
})();
</script>
</body>
</html>
