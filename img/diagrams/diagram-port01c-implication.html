<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORT-01c — Implication</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16;
    --card: #10121C;
    --elevated: #151722;
    --text-pri: #E0DFE4;
    --text-sec: rgba(224,223,228,0.6);
    --text-ter: rgba(224,223,228,0.4);
    --text-dim: rgba(224,223,228,0.2);
    --border-normal: rgba(224,223,228,0.07);
    --accent: #7FB5B0;
    --accent-dim: rgba(127,181,176,0.12);
    --casual: #D4A574;
    --red: #C47878;
    --blue: #8A9EC4;
    --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
    --glass-border: rgba(224,223,228,0.08);
    --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #08090F;
    display: flex;
    justify-content: center;
    padding: 40px;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Embed mode: strip body chrome when loaded in iframe */
  body.embedded {
    padding: 0;
    min-height: auto;
    display: block;
    background: transparent;
    overflow: hidden;
    align-items: initial;
  }
  body.embedded .diagram {
    width: 100%;
    border-radius: 0;
  }

  .diagram {
    width: 760px;
    background: var(--canvas);
    border-radius: 16px;
    overflow: hidden;
    padding: 48px;
    position: relative;
  }
  .diagram::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 300px 200px at 50% 50%, rgba(127,181,176,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.8;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
    opacity: 0;
    animation: fadeIn 0.5s ease-out 0.1s forwards;
  }

  .callout {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-highlight);
    border-radius: 12px;
    padding: 28px 32px;
    display: flex;
    align-items: flex-start;
    gap: 20px;
    position: relative;
    z-index: 1;
    opacity: 0;
    animation: cardSlideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s forwards;
  }
  .callout::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), rgba(127,181,176,0.2));
    border-radius: 2px 2px 0 0;
  }

  .callout-icon {
    width: 40px; height: 40px;
    flex-shrink: 0;
    margin-top: 2px;
    opacity: 0;
    animation: iconPulse 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
  }

  .callout-content {
    flex: 1;
  }
  .callout-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-pri);
    letter-spacing: -0.01em;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .callout-text {
    font-size: 13px;
    color: var(--text-sec);
    line-height: 1.6;
  }
  .callout-text em {
    color: var(--accent);
    font-style: normal;
    font-weight: 500;
  }

  /* Subtle count — visual anchor */
  .count-badge {
    position: absolute;
    top: 20px; right: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  @media (max-width: 680px) {
    .diagram { padding: 24px; }
    .callout { flex-direction: column; gap: 12px; }
    body { padding: 16px; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes cardSlideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes iconPulse {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 0.6; transform: scale(1); }
  }
</style>
</head>
<body>
  <div class="diagram">
    <div class="section-label">Implication</div>
    <div class="callout">
      <svg class="callout-icon" viewBox="0 0 40 40">
        <path d="M20 6l5.5 11 12.2 1.8-8.8 8.6 2.1 12.1L20 33.5l-11 5.8 2.1-12.1-8.8-8.6 12.2-1.8z"
              fill="none" stroke="#7FB5B0" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <div class="callout-content">
        <div class="callout-title">A single portfolio must hold up across all six rubrics</div>
        <div class="callout-text">Or expose which tradeoffs were made and why. There's no hiding behind one company's priorities — the weight distribution makes <em>every gap visible</em> to at least one evaluator.</div>
      </div>
      <span class="count-badge">6 / 6</span>
    </div>
  </div>
<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
</body>
</html>
