<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="figma-source" content="node:1242:964 file:TArUrZsBUocaAsqetjXq7V">
  <title>NOT-E2 Strategy Flywheel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --canvas: #0A0C16;
      --card: #10121C;
      --card-elevated: #161923;            /* Figma 1242:964 stage card bg */
      --card-border: rgba(48,55,75,0.5);   /* Figma 1242:964 stage card border */
      --text-pri: #E0DFE4;
      --text-sec: rgba(224,223,228,0.6);
      --text-ter: rgba(224,223,228,0.4);
      --text-mono: #c7ccd9;                /* Figma 1242:964 item text */
      --border-normal: rgba(224,223,228,0.07);
      --accent: #7FB5B0;
      --accent-dim: rgba(127,181,176,0.12);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--canvas);
      color: var(--text-pri);
      padding: 24px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    body.embedded { padding: 0; min-height: auto; display: block; background: transparent; overflow: hidden; }
    body.embedded .diagram { width: 100%; max-width: none; border-radius: 0; }

    .diagram {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── Flywheel: 3 cards + 2 transitions, equal-height via stretch ── */
    .flywheel-stages {
      display: flex;
      gap: 14px;
      align-items: stretch;       /* equal-height cards */
      justify-content: center;
      padding: 32px 20px 24px;
    }

    .stage {
      flex: 1;
      background: var(--card-elevated);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }

    /* Stage header: badge + title stacked */
    .stage-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
    }

    .stage-num {
      width: 32px;
      height: 32px;
      background: var(--accent-dim);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .stage-title {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-pri);
      letter-spacing: -0.16px;
      line-height: 1.2;
      text-transform: none;
    }

    /* Stage items list */
    .stage-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stage-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 11px;
      line-height: 16px;
      color: var(--text-mono);
    }

    .stage-item-bullet {
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Transition between stages — big arrow + caption ── */
    .transition-arrow {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 80px;
      align-self: center;
    }

    .transition-arrow-symbol {
      font-family: 'Inter', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
      letter-spacing: -1.44px;
    }

    .transition-label {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-sec);
      text-align: center;
      letter-spacing: 0.28px;
      line-height: 1.4;
    }

    /* ── Bottom return loop — horizontal teal line + uppercase label on the right ── */
    .return-loop {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px 0;
    }

    .return-line {
      flex: 1;
      height: 1px;
      background: var(--accent);
    }

    .loop-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.88px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .loop-glyph {
      font-size: 14px;
      font-weight: 400;
    }

    /* iframe-width rule: collapse only at ≤480px */
    @media (max-width: 480px) {
      .flywheel-stages {
        flex-direction: column;
        gap: 12px;
        padding: 16px 8px;
        align-items: stretch;
      }
      .stage { width: 100%; }
      .transition-arrow { transform: rotate(90deg); min-width: 0; padding: 4px 0; }
      .transition-label { transform: rotate(-90deg); white-space: nowrap; }
      .return-loop { padding: 12px 12px 0; }
      .loop-label { font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="diagram" data-diagram-id="not-e2">
    <div class="flywheel-stages">

      <!-- Stage 1: Leverage signal -->
      <div class="stage">
        <div class="stage-header">
          <div class="stage-num">1</div>
          <div class="stage-title">Leverage signal</div>
        </div>
        <ul class="stage-items">
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Geo &amp; SEO</span></li>
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Behavior</span></li>
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Contribution</span></li>
        </ul>
      </div>

      <!-- Transition 1 -->
      <div class="transition-arrow">
        <span class="transition-arrow-symbol">&rarr;</span>
        <span class="transition-label">Signal feeds value</span>
      </div>

      <!-- Stage 2: Deliver value -->
      <div class="stage">
        <div class="stage-header">
          <div class="stage-num">2</div>
          <div class="stage-title">Deliver value</div>
        </div>
        <ul class="stage-items">
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Community subs</span></li>
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Replies</span></li>
        </ul>
      </div>

      <!-- Transition 2 -->
      <div class="transition-arrow">
        <span class="transition-arrow-symbol">&rarr;</span>
        <span class="transition-label">Value refines tuning</span>
      </div>

      <!-- Stage 3: Tune experience -->
      <div class="stage">
        <div class="stage-header">
          <div class="stage-num">3</div>
          <div class="stage-title">Tune experience</div>
        </div>
        <ul class="stage-items">
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Insights</span></li>
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Suggestions</span></li>
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Reminders</span></li>
        </ul>
      </div>

    </div>

    <!-- Return loop: signal flows back to start -->
    <div class="return-loop" aria-label="Return loop: tuning strengthens signal">
      <div class="return-line"></div>
      <div class="loop-label"><span class="loop-glyph">&#8635;</span><span>Tuning strengthens signal</span></div>
    </div>

  </div>

<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
<!-- diagram-height-poster v1 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (!d) return 0;
    return Math.max(d.scrollHeight, d.offsetHeight,
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0);
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', send);
  else send();
  window.addEventListener('load', send);
  setTimeout(send, 50); setTimeout(send, 250); setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', send);
})();
</script>
</body>
</html>
