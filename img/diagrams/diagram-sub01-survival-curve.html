<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUB-01a — Survival Curve</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16;
    --elevated: #151722;
    --text-pri: #E0DFE4;
    --text-sec: rgba(224,223,228,0.6);
    --text-ter: rgba(224,223,228,0.4);
    --text-dim: rgba(224,223,228,0.2);
    --border: rgba(224,223,228,0.07);
    --accent: #7FB5B0;
    --red: #C47878;
    --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
    --glass-border: rgba(224,223,228,0.08);
    --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #08090F;
    display: flex;
    justify-content: center;
    padding: 40px;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .diagram {
    width: 760px;
    background: var(--canvas);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    padding: 32px;
  }
  .diagram::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 400px 300px at 50% 20%, rgba(196,120,120,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Survival curve card ── */
  /* ── Section label ── */
  .section-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
    color: var(--red);
  }

  .curve-card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-highlight);
    border-radius: 12px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }
  .curve-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100px; height: 2px;
    background: var(--red);
  }
  .curve-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .curve-title {
    font-size: 14px; font-weight: 600;
    color: var(--text-pri);
    letter-spacing: -0.01em;
  }
  .curve-period {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-ter);
    letter-spacing: 0.02em;
  }

  .chart-area {
    width: 100%;
    height: 200px;
    position: relative;
  }

  /* Animated curve draw */
  .curve-line {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
  }
  .curve-line.animate {
    animation: drawCurve 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes drawCurve {
    to { stroke-dashoffset: 0; }
  }
  .curve-fill {
    opacity: 0;
  }
  .curve-fill.animate {
    animation: fadeIn 0.8s ease 1.6s forwards;
  }
  @keyframes fadeIn {
    to { opacity: 0.4; }
  }

  /* Stat row */
  .stat-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .stat-big {
    font-size: 32px;
    font-weight: 700;
    color: var(--red);
    letter-spacing: -0.02em;
    line-height: 1;
    font-family: 'JetBrains Mono', monospace;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-ter);
    line-height: 1.4;
  }

  /* ── Entrance animations ── */
  .reveal {
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* 21-day pulse */
  .day-marker-pulse {
    animation: markerPulse 3s ease-in-out infinite;
  }
  @keyframes markerPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1; transform: none; transition: none; }
    .curve-line { stroke-dashoffset: 0; animation: none; }
    .curve-fill { opacity: 0.4; animation: none; }
    .day-marker-pulse { animation: none; opacity: 0.5; }
  }
  @media (max-width: 680px) {
    body { padding: 16px; }
    .diagram { width: 100%; }
  }

  /* Embed mode */
  body.embedded {
    padding: 0;
    min-height: auto;
    display: block;
    background: transparent;
    overflow: hidden;
    align-items: initial;
  }
  body.embedded .diagram {
    width: 100%;
    border-radius: 0;
  }
</style>
</head>
<body>
  <div class="diagram">
    <div class="section-label">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 1L11 10H1L6 1z" stroke="var(--red)" stroke-width="1.2" fill="rgba(196,120,120,0.15)"/></svg>
      The data
    </div>
    <div class="curve-card reveal">
      <div class="curve-header">
        <div class="curve-title">New Subreddit Survival</div>
        <span class="curve-period">30-day window</span>
      </div>
      <div class="chart-area">
        <svg width="100%" height="100%" viewBox="0 0 660 200" preserveAspectRatio="xMidYMid meet">
          <!-- Grid -->
          <line x1="50" y1="15" x2="50" y2="170" stroke="var(--border)" stroke-width="0.5"/>
          <line x1="50" y1="170" x2="640" y2="170" stroke="var(--border)" stroke-width="0.5"/>
          <line x1="50" y1="48" x2="640" y2="48" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,4"/>
          <line x1="50" y1="87" x2="640" y2="87" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,4"/>
          <line x1="50" y1="128" x2="640" y2="128" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,4"/>

          <!-- Y-axis -->
          <text x="44" y="19" text-anchor="end" fill="var(--text-dim)" font-size="9" font-family="JetBrains Mono">100%</text>
          <text x="44" y="52" text-anchor="end" fill="var(--text-dim)" font-size="9" font-family="JetBrains Mono">75%</text>
          <text x="44" y="91" text-anchor="end" fill="var(--text-dim)" font-size="9" font-family="JetBrains Mono">50%</text>
          <text x="44" y="132" text-anchor="end" fill="var(--text-dim)" font-size="9" font-family="JetBrains Mono">25%</text>
          <text x="44" y="174" text-anchor="end" fill="var(--text-dim)" font-size="9" font-family="JetBrains Mono">0%</text>

          <!-- X-axis -->
          <text x="56" y="186" fill="var(--text-dim)" font-size="9" font-family="JetBrains Mono">Day 1</text>
          <text x="200" y="186" fill="var(--text-dim)" font-size="9" font-family="JetBrains Mono">7</text>
          <text x="340" y="186" fill="var(--text-dim)" font-size="9" font-family="JetBrains Mono">14</text>
          <text x="490" y="186" fill="var(--text-dim)" font-size="9" font-family="JetBrains Mono">21</text>
          <text x="610" y="186" fill="var(--text-dim)" font-size="9" font-family="JetBrains Mono">30+</text>

          <!-- Danger zone -->
          <rect x="50" y="15" width="590" height="155" fill="rgba(196,120,120,0.02)" rx="0"/>

          <!-- Gradient def -->
          <defs>
            <linearGradient id="curveGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--red)" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="var(--red)" stop-opacity="0"/>
            </linearGradient>
          </defs>

          <!-- Curve, fill, marker, and annotation are generated by JS -->
          <path class="curve-fill" id="curveFill" fill="url(#curveGrad)"/>
          <path class="curve-line" id="curveLine" stroke="var(--red)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <line id="dayMarker" y1="10" y2="170" stroke="var(--red)" stroke-width="1" stroke-dasharray="4,3" class="day-marker-pulse"/>
          <rect id="dayMarkerBg" height="16" rx="4" fill="rgba(196,120,120,0.15)" stroke="rgba(196,120,120,0.3)" stroke-width="0.5"/>
          <text id="dayMarkerLabel" text-anchor="middle" fill="var(--red)" font-size="9" font-weight="600" font-family="JetBrains Mono"></text>
          <circle id="dataPoint" r="4" fill="var(--red)" opacity="0.9"/>
          <line id="annotLine" stroke="rgba(196,120,120,0.4)" stroke-width="0.8"/>
          <text id="annotLabel" fill="var(--red)" font-size="10" font-weight="600" font-family="Inter"></text>
          <text id="annotSub" fill="var(--text-ter)" font-size="8" font-family="Inter"></text>
        </svg>
      </div>
      <div class="stat-row">
        <span class="stat-big">90%</span>
        <span class="stat-label">of new subreddits failed within 21 days —<br/>no structured support existed</span>
      </div>
    </div>
  </div>

<script>
  const CHART_DATA = {
    points: [
      [1, 100],
      [3, 85],
      [5, 65],
      [7, 50],
      [10, 35],
      [14, 22],
      [18, 14],
      [21, 10],
      [25, 8],
      [30, 6],
    ],
    marker: {
      day: 21,
      label: '21 days',
      annotation: '90% failed',
      annotationSub: 'by this point',
    },
    bounds: { xMin: 56, xMax: 630, yMin: 15, yMax: 170 },
    dayRange: [1, 30],
  };

  function buildCurve(data) {
    const { points, marker, bounds } = data;
    const { xMin, xMax, yMin, yMax } = bounds;
    const [dayMin, dayMax] = data.dayRange;

    function toX(day) { return xMin + ((day - dayMin) / (dayMax - dayMin)) * (xMax - xMin); }
    function toY(pct) { return yMax - ((pct / 100) * (yMax - yMin)); }

    const coords = points.map(([day, pct]) => [toX(day), toY(pct)]);

    let linePath = `M${coords[0][0]},${coords[0][1]}`;
    for (let i = 1; i < coords.length; i++) {
      const [x0, y0] = coords[i - 1];
      const [x1, y1] = coords[i];
      const cpx = (x0 + x1) / 2;
      linePath += ` C${cpx},${y0} ${cpx},${y1} ${x1},${y1}`;
    }

    const fillPath = linePath + ` L${coords[coords.length-1][0]},${yMax} L${coords[0][0]},${yMax} Z`;

    document.getElementById('curveLine').setAttribute('d', linePath);
    document.getElementById('curveFill').setAttribute('d', fillPath);

    const markerX = toX(marker.day);
    const markerPt = points.find(p => p[0] === marker.day);
    const markerY = markerPt ? toY(markerPt[1]) : toY(10);

    document.getElementById('dayMarker').setAttribute('x1', markerX);
    document.getElementById('dayMarker').setAttribute('x2', markerX);

    const bgW = 44;
    document.getElementById('dayMarkerBg').setAttribute('x', markerX - bgW/2);
    document.getElementById('dayMarkerBg').setAttribute('y', 2);
    document.getElementById('dayMarkerBg').setAttribute('width', bgW);

    document.getElementById('dayMarkerLabel').setAttribute('x', markerX);
    document.getElementById('dayMarkerLabel').setAttribute('y', 13);
    document.getElementById('dayMarkerLabel').textContent = marker.label;

    document.getElementById('dataPoint').setAttribute('cx', markerX);
    document.getElementById('dataPoint').setAttribute('cy', markerY);

    const annotX = markerX + 40;
    const annotY = markerY - 13;
    document.getElementById('annotLine').setAttribute('x1', markerX + 4);
    document.getElementById('annotLine').setAttribute('y1', markerY);
    document.getElementById('annotLine').setAttribute('x2', annotX);
    document.getElementById('annotLine').setAttribute('y2', annotY);

    document.getElementById('annotLabel').setAttribute('x', annotX + 4);
    document.getElementById('annotLabel').setAttribute('y', annotY - 2);
    document.getElementById('annotLabel').textContent = marker.annotation;

    document.getElementById('annotSub').setAttribute('x', annotX + 4);
    document.getElementById('annotSub').setAttribute('y', annotY + 9);
    document.getElementById('annotSub').textContent = marker.annotationSub;
  }

  buildCurve(CHART_DATA);
</script>

<script>
  // Entrance animations
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Animated curve draw
  const curveCard = document.querySelector('.curve-card');
  if (curveCard) {
    const curveObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.querySelector('.curve-line')?.classList.add('animate');
          entry.target.querySelector('.curve-fill')?.classList.add('animate');
          curveObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.3 });
    curveObserver.observe(curveCard);
  }
</script>
<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
</body>
</html>
