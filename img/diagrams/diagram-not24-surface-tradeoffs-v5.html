<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOT-24 Surface Trade-offs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --canvas: #0A0C16; --card: #10121C; --elevated: #151722;
      --text-pri: #E0DFE4; --text-sec: rgba(224,223,228,0.6); --text-ter: rgba(224,223,228,0.4); --text-dim: rgba(224,223,228,0.2);
      --border-normal: rgba(224,223,228,0.07);
      --accent: #7FB5B0; --accent-dim: rgba(127,181,176,0.12);
      --red: #C47878;
      --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
      --glass-border: rgba(224,223,228,0.08);
      --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--canvas);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-pri);
      padding: 0;
      margin: 0;
    }

    body.embedded { padding: 0; min-height: auto; display: block; background: transparent; overflow: hidden; }
    body.embedded .diagram { width: 100%; max-width: none; border-radius: 0; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .diagram {
      width: 100%;
      padding: 24px 0;
    }

    .comparison {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 28px 16px 0;
      width: 100%;
      max-width: 1040px;
      margin: 0 auto;
    }

    .col {
      animation: fadeUp 0.6s var(--spring) forwards;
      opacity: 0;
    }

    .col:nth-child(1) { animation-delay: 0.1s; }
    .col:nth-child(2) { animation-delay: 0.2s; }
    .col:nth-child(3) { animation-delay: 0.3s; }

    /* Header: number + label stack */
    .col-header {
      display: flex;
      gap: 16px;
      align-items: center;
      width: 100%;
      margin-bottom: 14px;
    }

    .col-number {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 32px;
      line-height: 1.2;
      letter-spacing: -0.64px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .col-label-stack {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }

    .col-label {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 11px;
      line-height: 1.4;
      letter-spacing: 0.88px;
      text-transform: uppercase;
      color: var(--text-pri);
    }

    .col-subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.4;
      letter-spacing: 0.28px;
      color: var(--text-ter);
    }

    .mock-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 1206/2622;
      margin-bottom: 6px;
      border-radius: 16px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border-normal);
    }

    .mock {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .annotation {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-highlight);
      border-radius: 8px;
      padding: 7px 10px;
    }

    .annotation ul {
      list-style: disc;
      padding-left: 16px;
      margin: 0;
    }

    .annotation li {
      color: var(--accent);
      font-size: 11px;
      line-height: 1.4;
      font-weight: 400;
    }

    /* iframe-width rule: collapse only at ≤480px */
    @media (max-width: 480px) {
      .comparison { gap: 10px; }
      .col-number { font-size: 28px; }
    }
    @media (max-width: 400px) {
      .comparison { grid-template-columns: 1fr; gap: 24px; }
    }
  </style>
</head>
<body>
  <div class="diagram">
    <div class="comparison">
      <!-- Column 1: Inbox -->
      <div class="col">
        <div class="col-header">
          <div class="col-label-stack">
            <div class="col-label">Inbox</div>
            <div class="col-subtitle">Async &middot; destination</div>
          </div>
        </div>
        <div class="mock-frame">
          <img class="mock" src="assets/not24-inbox.png" alt="Inbox surface">
        </div>
        <div class="annotation">
          <ul>
            <li>Static chronological sort</li>
            <li>Limited utilities</li>
          </ul>
        </div>
      </div>

      <!-- Column 2: Private messages -->
      <div class="col">
        <div class="col-header">
          <div class="col-label-stack">
            <div class="col-label">Private messages</div>
            <div class="col-subtitle">Async &middot; thread list</div>
          </div>
        </div>
        <div class="mock-frame">
          <img class="mock" src="assets/not24-pms.png" alt="Private messages surface">
        </div>
        <div class="annotation">
          <ul>
            <li>Dynamic sort by recency</li>
            <li>Limited utilities</li>
          </ul>
        </div>
      </div>

      <!-- Column 3: Chat -->
      <div class="col">
        <div class="col-header">
          <div class="col-label-stack">
            <div class="col-label">Chat</div>
            <div class="col-subtitle">Sync &middot; live thread</div>
          </div>
        </div>
        <div class="mock-frame">
          <img class="mock" src="assets/not24-chat.png" alt="Chat surface">
        </div>
        <div class="annotation">
          <ul>
            <li>Dynamic sort by recency</li>
            <li>Multiple utilities</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
<!-- diagram-height-poster v2 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (d) {
      var rect = d.getBoundingClientRect();
      if (rect.height > 0) return Math.ceil(rect.height);
    }
    return Math.max(
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0
    );
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', send);
  else send();
  window.addEventListener('load', send);
  setTimeout(send, 50); setTimeout(send, 250); setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', function () {
    requestAnimationFrame(send);
    setTimeout(send, 50);
  });
  // Respond to parent re-measure requests (fires on any iframe-width change)
  window.addEventListener('message', function (e) {
    if (e && e.data && e.data.type === 'request-diagram-height') {
      requestAnimationFrame(send);
    }
  });
})();
</script>
</body>
</html>
