<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Threaded Source Posts (mobile) — pattern anatomy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16;
    --cool-teal: #7FB5B0;
    --text-primary: #E0DFE4;
    --text-tertiary: rgba(224,223,228,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08090F;
    display: flex;
    justify-content: center;
    padding: 24px 12px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .diagram {
    width: 375px;
    background: var(--canvas);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* Embedded UI screenshot — CSS-cropped to the source-post card portion */
  .shot {
    width: 100%;
    aspect-ratio: 322 / 335;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }
  .shot img.ui-screenshot {
    position: absolute;
    left: 0;
    top: -59.7%;
    width: 100%;
    height: auto;
    display: block;
  }

  /* Annotations stacked vertically */
  .annotations {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.88px;
    color: var(--cool-teal);
    text-transform: uppercase;
    line-height: 1.4;
    padding-left: 3px;
  }

  .annotation {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
  }
  .annotation .ann-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    color: var(--cool-teal);
  }
  .annotation .ann-icon svg { display: block; }
  .ann-content {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .ann-heading {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: normal;
  }
  .ann-desc {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-tertiary);
    line-height: 1.4;
  }

  /* Embedded mode */
  body.embedded {
    padding: 0;
    background: transparent;
    min-height: auto;
    display: block;
  }
  body.embedded .diagram {
    width: 100%;
    border-radius: 0;
  }
</style>
</head>
<body>
  <div class="diagram">

    <div class="shot">
      <img class="ui-screenshot" src="../ui-source-posts.png" alt="Threaded source post card — metadata row at top, core post body in the middle, threaded comments below" />

            <polyline points="3.5,8.5 6.5,11.5 12.5,5"/>

        </span>
        <div class="ann-content">
          <div class="ann-heading">Metadata row</div>
          <div class="ann-desc">Helps users scan subreddit, age, votes, and comment count</div>
        </div>
      </div>

      <div class="annotation">
        <span class="ann-icon" aria-hidden="true">
          <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3.5,8.5 6.5,11.5 12.5,5"/>
          </svg>
        </span>
        <div class="ann-content">
          <div class="ann-heading">Core post</div>
          <div class="ann-desc">Shows the title and preview text that anchored the synthesis</div>
        </div>
      </div>

      <div class="annotation">
        <span class="ann-icon" aria-hidden="true">
          <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3.5,8.5 6.5,11.5 12.5,5"/>

        </span>

      </div>
    </div>

  </div>

<script>if(window!==window.parent)document.body.classList.add("embedded");</script>
<!-- diagram-height-poster v2 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (d) {
      var rect = d.getBoundingClientRect();
      if (rect.height > 0) return Math.ceil(rect.height);
    }
    return Math.max(
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0
    );
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', send);
  else send();
  window.addEventListener('load', send);
  setTimeout(send, 50); setTimeout(send, 250); setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', function () {
    requestAnimationFrame(send);
    setTimeout(send, 50);
  });
  // Respond to parent re-measure requests (fires on any iframe-width change)
  window.addEventListener('message', function (e) {
    if (e && e.data && e.data.type === 'request-diagram-height') {
      requestAnimationFrame(send);
    }
  });
})();
</script>
</body>
</html>
