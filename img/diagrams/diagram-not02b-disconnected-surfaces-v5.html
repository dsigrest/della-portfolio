<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="figma-source" content="node:1170:766 page:29:43 file:TArUrZsBUocaAsqetjXq7V">
<title>NOT-02b — Disconnected surfaces</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16;
    --card: #10121C;
    --elevated: #151722;
    --text-pri: #E0DFE4;
    --text-sec: rgba(224,223,228,0.6);
    --text-ter: rgba(224,223,228,0.4);
    --text-dim: rgba(224,223,228,0.2);
    --border-normal: rgba(224,223,228,0.07);
    --accent: #7FB5B0;
    --accent-dim: rgba(127,181,176,0.12);
    --glass-bg: rgba(224,223,228,0.04);
    --glass-border: rgba(224,223,228,0.08);
    --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--canvas);
    display: flex;
    justify-content: center;
    padding: 40px;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body.embedded { padding: 0; min-height: auto; display: block; background: transparent; overflow: hidden; }
  body.embedded .diagram { width: 100%; max-width: none; border-radius: 0; }

  .diagram {
    width: 100%;
    max-width: 760px;
    background: var(--canvas);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    padding: 24px 0;
  }

  .comparison {
    padding: 28px 48px 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    align-items: start;
  }

  .col {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    min-width: 0;
    opacity: 0;
    animation: fadeUp 0.6s ease-out forwards;
  }
  .col:nth-child(1) { animation-delay: 0.05s; }
  .col:nth-child(2) { animation-delay: 0.15s; }
  .col:nth-child(3) { animation-delay: 0.25s; }
  .col:nth-child(4) { animation-delay: 0.35s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .col-label {
    display: flex;
    justify-content: center;
    color: var(--accent);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
    line-height: 1;
  }

  .mock-frame {
    padding: 0 8px;
    margin-bottom: 6px;
  }
  .mock {
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 1040 / 2250;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .mock.push { aspect-ratio: 1206 / 2622; }
  .mock img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .col:hover .mock {
    transform: translateY(-2px);
  }

  /* Annotation block — title (col-label) carries --accent above; body text
     pushed back to --text-sec for clear title→body hierarchy. min-height
     equalizes all four columns regardless of bullet count (Push: 1 line,
     Chat: 2 bullets, Inbox/PMs: 3 bullets). */
  .annotation {
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text-sec);
    font-size: 11px;
    line-height: 1.4;
    box-shadow: var(--glass-highlight);
    margin-top: 20px;
    min-height: 66px;
    display: flex;
    align-items: center;
    overflow-wrap: break-word;
    word-break: break-word;
    min-width: 0;
  }
  .annotation ul {
    list-style: disc;
    padding-left: 16px;
    width: 100%;
    min-width: 0;
  }
  .annotation ul li {
    margin: 0;
    overflow-wrap: break-word;
  }
  .annotation p {
    overflow-wrap: break-word;
  }
  .annotation p {
    margin: 0;
    width: 100%;
  }

  /* Soft radial glow behind cards */
  .diagram::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center 40%, rgba(127,181,176,0.04), transparent 70%);
    pointer-events: none;
  }


  @media (max-width: 600px) {
    .comparison { padding: 24px 16px 0; gap: 12px; }
    .annotation { font-size: 10px; padding: 8px 10px; min-height: 56px; }
    .annotation ul { padding-left: 12px; }
  }
  @media (max-width: 480px) {
    .comparison { grid-template-columns: 1fr 1fr; gap: 16px; padding: 24px 12px 0; }
    .annotation { min-height: auto; }
  }
</style>
</head>
<body>
<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
  <div class="diagram">
    <div class="comparison">
      <div class="col">
        <div class="col-label">Push notifications</div>
        <div class="mock-frame">
          <div class="mock push">
            <img src="assets/not02b-push.png" alt="iPhone lock screen with a Reddit push notification" loading="lazy">
          </div>
        </div>
        <div class="annotation">
          <p>All Reddit updates; by opt-in only</p>
        </div>
      </div>

      <div class="col">
        <div class="col-label">Inbox</div>
        <div class="mock-frame">
          <div class="mock">
            <img src="assets/not02b-inbox.png" alt="Reddit inbox notifications tab" loading="lazy">
          </div>
        </div>
        <div class="annotation">
          <ul>
            <li>Recommendations</li>

            <li>Activity updates</li>
          </ul>
        </div>

        <div class="mock-frame">
          <div class="mock">

<!-- diagram-height-poster v2 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (d) {
      var rect = d.getBoundingClientRect();
      if (rect.height > 0) return Math.ceil(rect.height);
    }
    return Math.max(
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0
    );
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', send);
  else send();
  window.addEventListener('load', send);
  setTimeout(send, 50); setTimeout(send, 250); setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', function () {
    requestAnimationFrame(send);
    setTimeout(send, 50);
  });
  // Respond to parent re-measure requests (fires on any iframe-width change)
  window.addEventListener('message', function (e) {
    if (e && e.data && e.data.type === 'request-diagram-height') {
      requestAnimationFrame(send);
    }
  });
})();
</script>
</body>
</html>
