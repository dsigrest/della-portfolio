<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="figma-source" content="node:1203:5467 page:29:42 file:TArUrZsBUocaAsqetjXq7V">
<title>Static MVP Methodology</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16;
    --card: #10121C;
    --elevated: #151722;
    --highest: #1A1C28;
    --text-pri: #E0DFE4;
    --text-sec: rgba(224,223,228,0.6);
    --text-ter: rgba(224,223,228,0.4);
    --text-dim: rgba(224,223,228,0.2);
    --border-normal: rgba(224,223,228,0.07);
    --accent: #7FB5B0;
    --accent-dim: rgba(127,181,176,0.12);
    --casual: #D4A574;
    --resur: #C4B078;
    --new-seg: #8A9EC4;
    --red: #C47878;
    --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
    --glass-border: rgba(224,223,228,0.08);
    --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #08090F;
    display: flex;
    justify-content: center;
    padding: 40px;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .diagram {
    width: 760px;
    background: var(--canvas);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }

  /* Verticals area */
  .verticals-area {
    padding: 48px;
    position: relative;
  }
  .verticals-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 160px 160px at 17% 45%, rgba(212,165,116,0.05) 0%, transparent 70%),
      radial-gradient(ellipse 160px 160px at 50% 45%, rgba(127,181,176,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 160px 160px at 83% 45%, rgba(138,158,196,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .verticals-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    position: relative;
    z-index: 1;
  }

  .vertical {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 20px 12px;
  }

  /* Icon containers */
  .vertical-icon {
    width: 96px;
    height: 96px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin-bottom: 20px;
  }
  .vertical.step-gen .vertical-icon { width: 100px; height: 100px; }

  /* SHR-05 style ambient glow — static, no breathing */
  .vertical-icon::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    opacity: 0.5;
  }
  .vertical.step-data .vertical-icon::before {
    background: radial-gradient(circle, rgba(212,165,116,0.10) 0%, transparent 70%);
  }
  .vertical.step-select .vertical-icon::before {
    background: radial-gradient(circle, rgba(127,181,176,0.10) 0%, transparent 70%);
  }
  .vertical.step-gen .vertical-icon::before {
    background: radial-gradient(circle, rgba(138,158,196,0.10) 0%, transparent 70%);
  }

  /* ── DATA AUDIT: 5×3 pixel grid — canonical dancing pixel pattern ──
     Non-sequential delays, two close brightness levels, no scale */
  .step-data .pixel-grid {
    position: relative;
    display: grid;
    grid-template-columns: repeat(5, 6px);
    grid-template-rows: repeat(3, 6px);
    gap: 3px;
  }
  .step-data .px {
    width: 6px; height: 6px;
    border-radius: 1px;
    background: rgba(212,165,116,0.4);
    animation: pixel-dance 4s ease-in-out infinite;
  }
  .step-data .px:nth-child(1)  { animation-delay: 0.10s; }
  .step-data .px:nth-child(2)  { animation-delay: 0.55s; }
  .step-data .px:nth-child(3)  { animation-delay: 0.30s; }
  .step-data .px:nth-child(4)  { animation-delay: 0.85s; }
  .step-data .px:nth-child(5)  { animation-delay: 0.20s; }
  .step-data .px:nth-child(6)  { animation-delay: 0.65s; }
  .step-data .px:nth-child(7)  { animation-delay: 0.40s; }
  .step-data .px:nth-child(8)  { animation-delay: 0.15s; }
  .step-data .px:nth-child(9)  { animation-delay: 0.75s; }
  .step-data .px:nth-child(10) { animation-delay: 0.45s; }
  .step-data .px:nth-child(11) { animation-delay: 0.05s; }
  .step-data .px:nth-child(12) { animation-delay: 0.60s; }
  .step-data .px:nth-child(13) { animation-delay: 0.35s; }
  .step-data .px:nth-child(14) { animation-delay: 0.80s; }
  .step-data .px:nth-child(15) { animation-delay: 0.25s; }
  @keyframes pixel-dance {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 0.7; }
  }

  /* ── VERTICAL SELECTION: 6 data bars — SHR-05 dancing-bar pattern ──
     Non-sequential delays, two close brightness levels */
  .step-select .data-bars {
    position: relative;
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 28px;
  }
  .step-select .bar {
    width: 4px;
    border-radius: 1px;
    background: rgba(127,181,176,0.4);
    animation: bar-dance 3.5s ease-in-out infinite;
  }
  .step-select .bar:nth-child(1) { height: 14px; animation-delay: 0.25s; }
  .step-select .bar:nth-child(2) { height: 24px; animation-delay: 0.70s; }
  .step-select .bar:nth-child(3) { height: 10px; animation-delay: 0.10s; }
  .step-select .bar:nth-child(4) { height: 28px; animation-delay: 0.85s; }
  .step-select .bar:nth-child(5) { height: 18px; animation-delay: 0.40s; }
  .step-select .bar:nth-child(6) { height: 20px; animation-delay: 0.55s; }
  @keyframes bar-dance {
    0%, 100% { opacity: 0.40; }
    50% { opacity: 0.75; }
  }

  /* ── PAGE GENERATION: regen arc — gentle ambient pulse ── */
  .step-gen .regen-icon {
    position: relative;
    animation: regen-pulse 4s ease-in-out infinite;
  }
  @keyframes regen-pulse {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 0.95; }
  }

  .vertical-name {
    font-size: 16px; font-weight: 600;
    color: var(--text-pri);
    letter-spacing: -0.01em;
    margin-top: 20px;
    margin-bottom: 6px;
  }
  .vertical-reason {
    font-size: 12px;
    color: var(--text-ter);
    line-height: 1.45;
    max-width: 180px;
  }

  @media (max-width: 680px) {
    .verticals-area { padding-left: 24px; padding-right: 24px; }
    body { padding: 16px; }
    .verticals-grid { gap: 24px; }
    .verticals-area::before {
      background:
        radial-gradient(ellipse 200px 200px at 50% 12%, rgba(212,165,116,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 200px 200px at 50% 50%, rgba(127,181,176,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 200px 200px at 50% 88%, rgba(138,158,196,0.06) 0%, transparent 70%);
    }
  }
  /* Only stack on the narrowest phones */
  @media (max-width: 400px) {
    .verticals-grid { grid-template-columns: 1fr; gap: 24px; }
  }
  /* Embed mode: strip body chrome when loaded in iframe */
  body.embedded {
    padding: 0;
    min-height: auto;
    display: block;
    background: transparent;
    overflow: hidden;
    align-items: initial;
  }
  body.embedded .diagram {
    width: 100%;
    border-radius: 0;
  }
</style>
</head>
<body>
  <div class="diagram">
    <div class="verticals-area">
      <div class="verticals-grid">
        <!-- Step 1: Data audit -->
        <div class="vertical step-data">
          <div class="vertical-icon">
            <div class="pixel-grid">
              <div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div>
              <div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div>
              <div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div>
            </div>
          </div>
          <div class="vertical-name">Data audit</div>
          <div class="vertical-reason">Understand usage patterns, coverage, and experiment requirements</div>
        </div>

        <!-- Step 2: Vertical selection -->
        <div class="vertical step-select">
          <div class="vertical-icon">
            <div class="data-bars">
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
          </div>
          <div class="vertical-name">Vertical selection</div>
          <div class="vertical-reason">Target high-traffic verticals with strong Reddit coverage</div>
        </div>

        <!-- Step 3: Page generation -->
        <div class="vertical step-gen">
          <div class="vertical-icon">
            <svg class="regen-icon" width="56" height="56" viewBox="0 0 56 56" fill="none" aria-hidden="true">
              <!-- Refresh-cycle arc: ~300° open circle with arrow head -->
              <path d="M 28 8 A 20 20 0 1 1 9.4 21" stroke="rgba(138,158,196,0.5)" stroke-width="2" fill="none" stroke-linecap="round"/>
              <!-- Arrowhead at top-left endpoint (suggests counterclockwise regen) -->
              <path d="M 21.5 7.5 L 28 8 L 27 14.5" stroke="rgba(138,158,196,0.5)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="vertical-name">Page generation</div>
          <div class="vertical-reason">Refresh pages periodically without real-time generation overhead</div>
        </div>
      </div>
    </div>
  </div>
</body>
<script>if(window!==window.parent)document.body.classList.add("embedded");</script>
<!-- diagram-height-poster v2 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (d) {
      var rect = d.getBoundingClientRect();
      if (rect.height > 0) return Math.ceil(rect.height);
    }
    return Math.max(
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0
    );
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', send);
  else send();
  window.addEventListener('load', send);
  setTimeout(send, 50); setTimeout(send, 250); setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', function () {
    requestAnimationFrame(send);
    setTimeout(send, 50);
  });
  // Respond to parent re-measure requests (fires on any iframe-width change)
  window.addEventListener('message', function (e) {
    if (e && e.data && e.data.type === 'request-diagram-height') {
      requestAnimationFrame(send);
    }
  });
})();
</script>
</html>
