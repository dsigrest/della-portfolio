<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stall Points — SUB-12t</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --canvas: #0A0C16;
      --elevated: #151722;
      --text-pri: #E0DFE4;
      --text-sec: rgba(224,223,228,0.6);
      --text-ter: rgba(224,223,228,0.4);
      --text-dim: rgba(224,223,228,0.2);
      --border: rgba(224,223,228,0.07);
      --accent: #7FB5B0;
      --accent-dim: rgba(127,181,176,0.12);
      --red: #C47878;
      --resur: #C4B078;
      --warm: #D4A574;
      --blue: #8A9EC4;
      --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
      --glass-border: rgba(224,223,228,0.08);
      --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
    }
    
    body {
      background: #08090F;
      display: flex;
      justify-content: center;
      padding: 40px;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    
    .diagram {
      width: 760px;
      background: var(--canvas);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      padding: 36px 48px;
    }
    
    .diagram::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 200px;
      background: radial-gradient(circle at center, rgba(127,181,176,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    
    .diagram > * { position: relative; z-index: 1; }
    
    .stalls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    
    .stall-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-highlight);
      /* Workstream A: border-radius 10→12 (prevailing pattern + Figma x=914 polish) */
      border-radius: 12px;
      padding: 14px 16px;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .stall-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 27px;
      width: 3px;
      border-radius: 12px 0 0 0;
    }
    
    .stall-card.red::before { background: rgba(196,120,120,0.5); }
    .stall-card.warm::before { background: rgba(212,165,116,0.5); }
    .stall-card.blue::before { background: rgba(138,158,196,0.5); }
    
    .stall-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.36px;
      text-transform: uppercase;
      margin-bottom: 8px;
      line-height: 1;
    }
    
    .stall-card.red .stall-label { color: var(--red); }
    .stall-card.warm .stall-label { color: var(--warm); }
    .stall-card.blue .stall-label { color: var(--blue); }
    
    .stall-desc {
      font-size: 10px;
      color: var(--text-ter);
      line-height: 1.5;
      margin-bottom: 12px;
      flex-grow: 1;
    }
    
    .stall-bar-track {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    
    .stall-bar-fill {
      height: 100%;
      border-radius: 2px;
    }
    
    .stall-card.red .stall-bar-fill { background: var(--red); }
    .stall-card.warm .stall-bar-fill { background: var(--warm); }
    .stall-card.blue .stall-bar-fill { background: var(--blue); }
    
    .stall-metric {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      color: var(--text-dim);
      text-align: left;
    }
    
    .reveal {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Workstream A Session 28: Pattern C responsive collapse — 3-col stalls-grid → 1-col at @768 (matches sibling sub11-text-bars) */
    @media (max-width: 768px) {
      .stalls-grid { grid-template-columns: 1fr; }
    }
    
    body.embedded {
      padding: 0;
      min-height: auto;
      display: block;
      background: transparent;
      overflow: hidden;
      align-items: initial;
    }
    
    body.embedded .diagram {
      width: 100%;
      border-radius: 0;
    }
  </style>
</head>
<body>
  <div class="diagram">
    <div class="stalls-grid">
      <!-- Biggest stall -->
      <div class="stall-card red reveal">
        <div class="stall-label">Biggest stall</div>
        <div class="stall-desc">Description skipped most — mods didn't see it as urgent at creation</div>
        <div class="stall-bar-track">
          <div class="stall-bar-fill" style="width: 28%;"></div>
        </div>
        <div class="stall-metric">28% at Create</div>
      </div>
      
      <!-- Key skip -->
      <div class="stall-card warm reveal">
        <div class="stall-label">Key skip</div>
        <div class="stall-desc">Rules often skipped at Growth — revisited later at Mod Team stage</div>
        <div class="stall-bar-track">
          <div class="stall-bar-fill" style="width: 45%;"></div>
        </div>
        <div class="stall-metric">45% at Growth</div>
      </div>
      
      <!-- Critical gate -->
      <div class="stall-card blue reveal">
        <div class="stall-label">Critical gate</div>
        <div class="stall-desc">Co-mod recruitment — teams significantly outperformed solo founders</div>
        <div class="stall-bar-track">
          <div class="stall-bar-fill" style="width: 72%;"></div>
        </div>
        <div class="stall-metric">72% at Sustain</div>
      </div>
    </div>
  </div>

  <script>
    if (window !== window.parent) document.body.classList.add('embedded');
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });
    
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
