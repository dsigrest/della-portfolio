<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instrumentation Heatmap — SUB-12c</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --canvas: #0A0C16;
      --elevated: #151722;
      --text-pri: #E0DFE4;
      --text-sec: rgba(224,223,228,0.6);
      --text-ter: rgba(224,223,228,0.4);
      --text-dim: rgba(224,223,228,0.2);
      --border: rgba(224,223,228,0.07);
      --accent: #7FB5B0;
      --accent-dim: rgba(127,181,176,0.12);
      --red: #C47878;
      --resur: #C4B078;
      --warm: #D4A574;
      --blue: #8A9EC4;
      --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
      --glass-border: rgba(224,223,228,0.08);
      --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
    }
    
    body {
      background: #08090F;
      display: flex;
      justify-content: center;
      padding: 40px;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    
    .diagram {
      width: 760px;
      background: var(--canvas);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      padding: 36px 48px;
    }
    
    .diagram::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 200px;
      background: radial-gradient(circle at center, rgba(127,181,176,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    
    .diagram > * { position: relative; z-index: 1; }
    
    .heatmap-header {
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    
    .heatmap-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: rgba(127,181,176,0.7);
      margin-bottom: 8px;
    }
    
    .heatmap-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-pri);
    }
    
    .heatmap-grid {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    
    .heatmap-row {
      display: flex;
      gap: 3px;
      align-items: stretch;
    }
    
    .heatmap-row-label {
      width: 80px;
      display: flex;
      align-items: center;
      font-size: 9px;
      color: var(--text-ter);
      font-weight: 500;
      flex-shrink: 0;
    }
    
    .heatmap-col-header {
      width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.32px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
      padding: 0 4px;
    }
    
    .heatmap-row-data {
      display: flex;
      gap: 3px;
      flex: 1;
    }
    
    .heatmap-cell {
      flex: 1;
      height: 36px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      color: var(--text-pri);
      text-align: center;
    }
    
    .heatmap-cell.empty {
      background: rgba(224,223,228,0.03);
      color: rgba(224,223,228,0.2);
    }
    
    .heatmap-cell.low {
      background: rgba(127,181,176,0.08);
      color: var(--text-pri);
    }
    
    .heatmap-cell.medium {
      background: rgba(127,181,176,0.16);
      color: var(--text-pri);
    }
    
    .heatmap-cell.high {
      background: rgba(127,181,176,0.28);
      color: var(--text-pri);
    }
    
    .heatmap-cell.very-high {
      background: rgba(127,181,176,0.42);
      color: var(--text-pri);
    }
    
    .heatmap-cell.stall {
      background: rgba(196,120,120,0.2);
      color: #C47878;
    }
    
    .legend {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }
    
    .legend-label {
      font-size: 8px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      color: var(--text-dim);
      letter-spacing: 0.32px;
    }
    
    .legend-swatches {
      display: flex;
      gap: 4px;
    }
    
    .legend-swatch {
      width: 16px;
      height: 8px;
      border-radius: 1px;
    }
    
    .swatch-light { background: rgba(127,181,176,0.08); }
    .swatch-medium { background: rgba(127,181,176,0.16); }
    .swatch-high { background: rgba(127,181,176,0.28); }
    .swatch-very-high { background: rgba(127,181,176,0.42); }
    
    .legend-stall {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }
    
    .stall-dot {
      width: 8px;
      height: 8px;
      background: rgba(196,120,120,0.2);
      border-radius: 1px;
    }
    
    .stall-label {
      font-size: 8px;
      color: var(--text-ter);
      font-family: 'Inter', sans-serif;
    }
    
    .reveal {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    
    body.embedded {
      padding: 0;
      min-height: auto;
      display: block;
      background: transparent;
      overflow: hidden;
      align-items: initial;
    }
    
    body.embedded .diagram {
      width: 100%;
      border-radius: 0;
    }
  </style>
</head>
<body>
  <div class="diagram">
    <div class="heatmap-header reveal">
      <div class="heatmap-label">Instrumentation — Action Completion Heatmap</div>
      <div class="heatmap-title">Where creators completed, skipped, and stalled</div>
    </div>
    
    <div class="heatmap-grid reveal">
      <div class="heatmap-row">
        <div style="width: 80px;"></div>
        <div class="heatmap-col-header">Create</div>
        <div class="heatmap-col-header">Setup</div>
        <div class="heatmap-col-header">Content</div>
        <div class="heatmap-col-header">Growth</div>
        <div class="heatmap-col-header">Sustain</div>
      </div>
      
      <div class="heatmap-row">
        <div class="heatmap-row-label">Avatar</div>
        <div class="heatmap-row-data">
          <div class="heatmap-cell very-high">92%</div>
          <div class="heatmap-cell empty">—</div>
          <div class="heatmap-cell empty">—</div>
          <div class="heatmap-cell empty">—</div>
          <div class="heatmap-cell empty">—</div>
        </div>
      </div>
      
      <div class="heatmap-row">
        <div class="heatmap-row-label">Description</div>
        <div class="heatmap-row-data">
          <div class="heatmap-cell stall">28%</div>
          <div class="heatmap-cell medium">45%</div>
          <div class="heatmap-cell low">12%</div>
          <div class="heatmap-cell empty">—</div>
          <div class="heatmap-cell empty">—</div>
        </div>
      </div>
      
      <div class="heatmap-row">
        <div class="heatmap-row-label">Rules</div>
        <div class="heatmap-row-data">
          <div class="heatmap-cell low">18%</div>
          <div class="heatmap-cell low">34%</div>
          <div class="heatmap-cell high">62%</div>
          <div class="heatmap-cell medium">41%</div>
          <div class="heatmap-cell low">8%</div>
        </div>
      </div>
      
      <div class="heatmap-row">
        <div class="heatmap-row-label">First post</div>
        <div class="heatmap-row-data">
          <div class="heatmap-cell empty">—</div>
          <div class="heatmap-cell low">15%</div>
          <div class="heatmap-cell very-high">88%</div>
          <div class="heatmap-cell empty">—</div>
          <div class="heatmap-cell empty">—</div>
        </div>
      </div>
      
      <div class="heatmap-row">
        <div class="heatmap-row-label">Co-mod</div>
        <div class="heatmap-row-data">
          <div class="heatmap-cell empty">—</div>
          <div class="heatmap-cell empty">—</div>
          <div class="heatmap-cell stall">8%</div>
          <div class="heatmap-cell low">36%</div>
          <div class="heatmap-cell medium">54%</div>
        </div>
      </div>
      
      <div class="heatmap-row">
        <div class="heatmap-row-label">Analytics</div>
        <div class="heatmap-row-data">
          <div class="heatmap-cell empty">—</div>
          <div class="heatmap-cell empty">—</div>
          <div class="heatmap-cell empty">—</div>
          <div class="heatmap-cell high">58%</div>
          <div class="heatmap-cell very-high">82%</div>
        </div>
      </div>
    </div>
    
    <div class="legend reveal">
      <div class="legend-label">Adoption</div>
      <div class="legend-swatches">
        <div class="legend-swatch swatch-light"></div>
        <div class="legend-swatch swatch-medium"></div>
        <div class="legend-swatch swatch-high"></div>
        <div class="legend-swatch swatch-very-high"></div>
      </div>
      <div class="legend-stall">
        <div class="stall-dot"></div>
        <div class="stall-label">Stall point</div>
      </div>
    </div>
  </div>

  <script>
    if (window !== window.parent) document.body.classList.add('embedded');
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });
    
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
