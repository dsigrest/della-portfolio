<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="figma-source" content="node:1214:16053 file:TArUrZsBUocaAsqetjXq7V">
<title>NOT-E7 — Sankey Flow: User Segmentation &amp; Contribution</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16; --card: #10121C; --elevated: #151722;
    --text-pri: #E0DFE4; --text-sec: rgba(224,223,228,0.6); --text-ter: rgba(224,223,228,0.4); --text-dim: rgba(224,223,228,0.2);
    --border-normal: rgba(224,223,228,0.07);
    --accent: #7FB5B0; --accent-dim: rgba(127,181,176,0.12);
    --gold: #C4B078; --red: #C47878;
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--canvas);
    display: flex;
    justify-content: center;
    padding: 24px;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body.embedded { padding: 0; min-height: auto; display: block; background: transparent; overflow: hidden; }
  body.embedded .diagram { width: 100%; max-width: none; border-radius: 0; }

  /* Frame standard: 24px top + 24px bottom on .diagram (matches Figma 1214:16053 outer frame padding) */
  .diagram {
    width: 100%;
    max-width: 760px;
    background: var(--canvas);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    padding: 24px 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }

  /* ── Sankey area (top) ── */
  .sankey-area {
    padding: 0 48px;
    position: relative;
    height: 420px;
    opacity: 1;
    animation: mount 0.5s var(--spring);
  }
  .sankey-area::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 500px 300px at 50% 50%, rgba(127,181,176,0.025) 0%, transparent 70%);
    pointer-events: none;
  }
  .sankey-svg { width: 100%; height: 100%; overflow: visible; }

  /* Main flow base opacity — gradient stops carry the within-flow fade nuance.
     Dropouts override inline with fill-opacity:0.30 for the dimmed-past look. */
  .flow-path {
    fill-opacity: 0.85; stroke: none;
  }

  .node-bar {
    rx: 3; ry: 3;
  }

  .col-metric {
    font-family: 'Inter', sans-serif; font-weight: 700;
    fill: var(--text-pri); text-anchor: middle;
  }
  .col-sub {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    fill: var(--text-ter); text-anchor: middle;
  }

  .dropout-label {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    fill: var(--text-sec); text-anchor: start;
  }

  /* ── Legend (bottom) ── */
  .legend-bar {
    padding: 16px 48px 0;
    display: flex;
    gap: 20px;
    align-items: center;
    opacity: 1;
    animation: mount 0.5s var(--spring) 0.15s;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-sec);
    padding: 4px 8px;
    border-radius: 6px;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .legend-dot.core { background: var(--accent); }
  .legend-dot.casual { background: var(--gold); }
  .legend-dot.new { background: var(--red); }

  @keyframes mount { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Subtle disclaimer below the diagram — small, secondary, non-defensive. */
  .diagram-caption {
    padding: 12px 48px 0;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    line-height: 1.5;
    color: var(--text-ter);
    font-style: italic;
  }
  @media (max-width: 480px) {
    .diagram-caption { padding: 10px 16px 0; font-size: 10px; }
  }

  /* iframe-width rule: collapse only at ≤480px */
  @media (max-width: 480px) {
    .sankey-area { padding: 0 16px; height: 320px; }
    .legend-bar { flex-wrap: wrap; gap: 8px; padding: 12px 16px 0; }
  }
</style>
</head>
<body>
<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
<div class="diagram">

  <div class="sankey-area">
    <svg class="sankey-svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 664 420">
      <defs>
        <!-- Each gradient: gentler fade than before — saturated end stays bright (~0.95),
             dim end at ~0.55. With fill-opacity 0.85, effective range is 85% → 47%. -->
        <linearGradient id="gCore" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%"   stop-color="#7FB5B0" stop-opacity="1.0"/>
          <stop offset="30%"  stop-color="#7FB5B0" stop-opacity="0.95"/>
          <stop offset="70%"  stop-color="#7FB5B0" stop-opacity="0.75"/>
          <stop offset="100%" stop-color="#7FB5B0" stop-opacity="0.55"/>
        </linearGradient>
        <linearGradient id="gCasual" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%"   stop-color="#C4B078" stop-opacity="1.0"/>
          <stop offset="30%"  stop-color="#C4B078" stop-opacity="0.95"/>
          <stop offset="70%"  stop-color="#C4B078" stop-opacity="0.75"/>
          <stop offset="100%" stop-color="#C4B078" stop-opacity="0.55"/>
        </linearGradient>
        <linearGradient id="gNew" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%"   stop-color="#C47878" stop-opacity="1.0"/>
          <stop offset="30%"  stop-color="#C47878" stop-opacity="0.95"/>
          <stop offset="70%"  stop-color="#C47878" stop-opacity="0.75"/>
          <stop offset="100%" stop-color="#C47878" stop-opacity="0.55"/>
        </linearGradient>
      </defs>

      <!-- Column headers — generalized for public-portfolio NDA safety. -->
      <text class="col-metric" font-size="14" x="27" y="24" text-anchor="start">Millions</text>
      <text class="col-sub" x="27" y="38" text-anchor="start">inbox visitors</text>
      <text class="col-metric" font-size="14" x="332" y="24">Nearly half</text>
      <text class="col-sub" x="332" y="38">clicked into inbox content</text>
      <text class="col-metric" font-size="14" x="637" y="24" text-anchor="end">Most clickers</text>
      <text class="col-sub" x="637" y="38" text-anchor="end">contributed</text>

      <!-- Stage 1 → Stage 2 main flows — each col1 bar splits cleanly into a top "active"
           slice (here) and a bottom "dropout" slice (below). No source overlap. -->
      <!-- Core main: col1 y=50-195 (top half of core bar) → col2 active y=50-195 -->
      <path class="flow-path" d="M34,50 C180,50 180,50 332,50 L332,195 C180,195 180,195 34,195 Z" fill="url(#gCore)"/>
      <!-- Casual main: col1 y=344-354 (top slice of casual bar) → col2 active y=197-207 -->
      <path class="flow-path" d="M34,344 C180,344 180,197 332,197 L332,207 C180,207 180,354 34,354 Z" fill="url(#gCasual)"/>
      <!-- New main: col1 y=376-387 (top slice of new bar) → col2 active y=209-220 -->
      <path class="flow-path" d="M34,376 C180,376 180,209 332,209 L332,220 C180,220 180,387 34,387 Z" fill="url(#gNew)"/>

      <!-- Stage 1 → Stage 2 dropout flows — each sources from the BOTTOM slice of its col1
           bar (adjacent to the active slice above), terminating in col2 dropout bar y=256-414. -->
      <!-- Core dropout: col1 y=195-340 (bottom half of core bar) → dropout bar y=256-396 -->
      <path class="flow-path" d="M34,195 C180,195 180,256 332,256 L332,396 C180,396 180,340 34,340 Z" fill="url(#gCore)" style="fill-opacity:0.30"/>
      <!-- Casual dropout: col1 y=354-372 (bottom slice of casual bar) → dropout bar y=396-405 -->
      <path class="flow-path" d="M34,354 C180,354 180,396 332,396 L332,405 C180,405 180,372 34,372 Z" fill="url(#gCasual)" style="fill-opacity:0.30"/>
      <!-- New dropout: col1 y=387-406 (bottom slice of new bar) → dropout bar y=405-414 -->
      <path class="flow-path" d="M34,387 C180,387 180,405 332,405 L332,414 C180,414 180,406 34,406 Z" fill="url(#gNew)" style="fill-opacity:0.30"/>

      <!-- Stage 2 → Stage 3 main flows (terminate at right column x=637) -->
      <path class="flow-path" d="M339,51 C490,51 490,51 637,51 L637,159 C490,159 490,155 339,155 Z" fill="url(#gCore)"/>
      <path class="flow-path" d="M339,197 C490,197 490,162 637,162 L637,170 C490,170 490,207 339,207 Z" fill="url(#gCasual)"/>
      <path class="flow-path" d="M339,209 C490,209 490,172 637,172 L637,182 C490,182 490,220 339,220 Z" fill="url(#gNew)"/>

      <!-- Stage 2 → Stage 3 dropout flows (terminate at x=594, "25% didn't contribute" bar y=287-343) -->
      <!-- Core dropout — bulk of dropout bar -->
      <path class="flow-path" d="M339,159 C470,159 470,287 594,287 L594,326 C470,326 470,195 339,195 Z" fill="url(#gCore)" style="fill-opacity:0.30"/>
      <!-- Casual dropout — middle slice -->
      <path class="flow-path" d="M339,205 C470,205 470,326 594,326 L594,335 C470,335 470,208 339,208 Z" fill="url(#gCasual)" style="fill-opacity:0.30"/>
      <!-- New dropout — bottom slice -->
      <path class="flow-path" d="M339,217 C470,217 470,335 594,335 L594,343 C470,343 470,220 339,220 Z" fill="url(#gNew)" style="fill-opacity:0.30"/>

      <!-- Column 1 (DAU) node bars — 3 segments per Figma 1214:16053 -->
      <rect class="node-bar" fill="#7FB5B0" height="290" width="14" x="20" y="50"/>
      <rect class="node-bar" fill="#C4B078" height="28" width="14" x="20" y="344"/>
      <rect class="node-bar" fill="#C47878" height="30" width="14" x="20" y="376"/>

      <!-- Column 2 (Clickers) node bars -->
      <rect class="node-bar" fill="#7FB5B0" height="145" width="14" x="325" y="50"/>
      <rect class="node-bar" fill="#C4B078" height="10" width="14" x="325" y="197"/>
      <rect class="node-bar" fill="#C47878" height="11" width="14" x="325" y="209"/>
      <!-- Col 2 dropout bar (over half didn't click) -->
      <rect class="node-bar" fill="rgba(224,223,228,0.08)" height="158" rx="3" width="14" x="325" y="256"/>
      <text class="dropout-label" x="347" y="340">Over half</text>
      <text class="dropout-label" font-size="8" x="346.5" y="353">did not click</text>

      <!-- Column 3 (Contributors) node bars -->
      <rect class="node-bar" fill="#7FB5B0" height="108" width="14" x="632" y="51"/>
      <rect class="node-bar" fill="#C4B078" height="8" width="14" x="632" y="162"/>
      <rect class="node-bar" fill="#C47878" height="10" width="14" x="632" y="172"/>
      <!-- Col 3 dropout bar (some clickers did not contribute) -->
      <rect class="node-bar" fill="rgba(224,223,228,0.08)" height="56" rx="3" width="14" x="580" y="287"/>
      <text class="dropout-label" font-size="9" x="602" y="309">Some clickers</text>
      <text class="dropout-label" font-size="8" x="602" y="322">did not</text>
      <text class="dropout-label" font-size="8" x="602" y="333">contribute</text>
    </svg>
  </div>

  <div class="legend-bar">
    <div class="legend-item"><div class="legend-dot core"></div>Core users</div>
    <div class="legend-item"><div class="legend-dot casual"></div>Casual users</div>
    <div class="legend-item"><div class="legend-dot new"></div>New users</div>
  </div>

  <p class="diagram-caption">Representative model based on anonymized behavioral patterns. Exact values, audience definitions, and internal methodology have been generalized.</p>

</div>

<!-- diagram-height-poster v2 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (d) {
      var rect = d.getBoundingClientRect();
      if (rect.height > 0) return Math.ceil(rect.height);
    }
    return Math.max(
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0
    );
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', send);
  else send();
  window.addEventListener('load', send);
  setTimeout(send, 50); setTimeout(send, 250); setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', function () {
    requestAnimationFrame(send);
    setTimeout(send, 50);
  });
  // Respond to parent re-measure requests (fires on any iframe-width change)
  window.addEventListener('message', function (e) {
    if (e && e.data && e.data.type === 'request-diagram-height') {
      requestAnimationFrame(send);
    }
  });
})();
</script>
</body>
</html>
