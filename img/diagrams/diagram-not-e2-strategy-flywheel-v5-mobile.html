<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOT-E2 Strategy Flywheel &mdash; Mobile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --canvas: #0A0C16; --card: #10121C; --elevated: #151722;
      --text-pri: #E0DFE4; --text-sec: rgba(224,223,228,0.6); --text-ter: rgba(224,223,228,0.4); --text-dim: rgba(224,223,228,0.2);
      --border-normal: rgba(224,223,228,0.07);
      --accent: #7FB5B0; --accent-dim: rgba(127,181,176,0.12);
      --red: #C47878;
      --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
      --glass-border: rgba(224,223,228,0.08);
      --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--canvas);
      color: var(--text-pri);
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    body.embedded { padding: 0; min-height: auto; display: block; background: transparent; overflow: hidden; }
    body.embedded .diagram { width: 100%; max-width: none; border-radius: 0; }

    .diagram {
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
    }

    .flywheel-stages {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stage {
      background: var(--card);
      border: 1px solid var(--border-normal);
      border-radius: 8px;
      padding: 18px 14px;
    }

    .stage-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: block;
    }

    .stage-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stage-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--text-pri);
    }

    .stage-item-bullet {
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .transition-arrow {
      flex-shrink: 0;
      text-align: center;
      font-size: 11px;
      color: var(--text-sec);
      padding: 4px 0;
    }

    .transition-arrow-symbol {
      font-size: 20px;
      color: var(--accent);
      display: block;
      margin-bottom: 4px;
      transform: rotate(90deg);
    }

    .transition-label {
      font-size: 10px;
      color: var(--text-sec);
    }

    .loop-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border-normal);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 16px;
    }

    .loop-symbol {
      font-size: 16px;
      color: var(--accent);
      animation: rotate 8s linear infinite;
    }

    .loop-label {
      font-size: 11px;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="diagram">
    <div class="flywheel-stages">
      <div class="stage">
        <span class="stage-title">Leverage signal</span>
        <ul class="stage-items">
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Geo &amp; SEO</span></li>
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Behavior</span></li>
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Contribution</span></li>
        </ul>
      </div>

      <div class="transition-arrow">
        <span class="transition-arrow-symbol">&rarr;</span>
        <span class="transition-label">Signal feeds value</span>
      </div>

      <div class="stage">
        <span class="stage-title">Deliver value</span>
        <ul class="stage-items">
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Community subscriptions</span></li>
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Replies</span></li>
        </ul>
      </div>

      <div class="transition-arrow">
        <span class="transition-arrow-symbol">&rarr;</span>
        <span class="transition-label">Value refines tuning</span>
      </div>

      <div class="stage">
        <span class="stage-title">Tune experience</span>
        <ul class="stage-items">
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Insights</span></li>
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Search</span></li>
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Suggestions</span></li>
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Post views</span></li>
          <li class="stage-item"><span class="stage-item-bullet"></span><span>Reminders</span></li>
        </ul>
      </div>
    </div>

    <div class="loop-container">
      <span class="loop-symbol">&#8635;</span>
      <span class="loop-label">Tuning strengthens signal</span>
    </div>
  </div>

<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
<!-- diagram-height-poster v1 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (!d) return 0;
    return Math.max(d.scrollHeight, d.offsetHeight,
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0);
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', send);
  else send();
  window.addEventListener('load', send);
  setTimeout(send, 50); setTimeout(send, 250); setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', send);
})();
</script>
</body>
</html>
