<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="figma-source" content="node:1176:1726 page:29:43 file:TArUrZsBUocaAsqetjXq7V">
<title>NOT-10 — Three different inboxes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16;
    --card: #10121C;
    --text-pri: #E0DFE4;
    --text-sec: rgba(224,223,228,0.6);
    --text-ter: rgba(224,223,228,0.4);
    --accent: #7FB5B0;
    --glass-bg: rgba(224,223,228,0.04);
    --glass-border: rgba(224,223,228,0.08);
    --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #08090F;
    display: flex;
    justify-content: center;
    padding: 40px;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .diagram {
    width: 100%;
    max-width: 760px;
    background: var(--canvas);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    padding: 48px 0;
  }

  .comparison {
    padding: 28px 48px 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    align-items: start;
  }

  .col {
    display: flex;
    flex-direction: column;
    min-width: 0;
    opacity: 0;
    animation: fadeUp 0.6s ease-out forwards;
  }
  .col:nth-child(1) { animation-delay: 0.05s; }
  .col:nth-child(2) { animation-delay: 0.18s; }
  .col:nth-child(3) { animation-delay: 0.31s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .col-label {
    display: flex;
    justify-content: center;
    color: var(--accent);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
    line-height: 1;
  }

  .mock-frame {
    padding: 0 8px;
    margin-bottom: 6px;
  }
  .mock {
    width: 100%;
    aspect-ratio: 1040 / 2250;
    overflow: hidden;
    background: #fff;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .col:hover .mock {
    transform: translateY(-2px);
  }
  .mock img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .annotation {
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--accent);
    font-size: 11px;
    line-height: 1.4;
    box-shadow: var(--glass-highlight);
    margin-top: 10px;
  }

  .diagram::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center 35%, rgba(127,181,176,0.04), transparent 70%);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="diagram">
    <div class="comparison">
      <div class="col">
        <div class="col-label">New user</div>
        <div class="mock-frame">
          <div class="mock">
            <img src="assets/not10-newuser.png" alt="Inbox for a new user — empty state with 'Wow, such empty' illustration" loading="lazy">
          </div>
        </div>
        <div class="annotation">The inbox is empty</div>
      </div>

      <div class="col">
        <div class="col-label">Subscriber</div>
        <div class="mock-frame">
          <div class="mock">
            <img src="assets/not10-subscriber.png" alt="Inbox for a subscriber — three or four notification cards from joined communities" loading="lazy">
          </div>
        </div>
        <div class="annotation">The inbox is hard to customize</div>
      </div>

      <div class="col">
        <div class="col-label">Contributor</div>
        <div class="mock-frame">
          <div class="mock">
            <img src="assets/not10-contributor.png" alt="Inbox for a contributor — long stack of replies, post-view stats, and chat invites" loading="lazy">
          </div>
        </div>
        <div class="annotation">The inbox is crowded</div>
      </div>
    </div>
  </div>
<!-- diagram-height-poster v1 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (!d) return 0;
    return Math.max(
      d.scrollHeight, d.offsetHeight,
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0
    );
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) {
      window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', send);
  } else {
    send();
  }
  window.addEventListener('load', send);
  // Re-send to catch font swaps, image loads, animations.
  setTimeout(send, 50);
  setTimeout(send, 250);
  setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', send);
})();
</script>
</body>
</html>
