<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOT-07 — Preference Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #0A0C16; --card: #10121C; --elevated: #151722;
    --text-pri: #E0DFE4; --text-sec: rgba(224,223,228,0.6); --text-ter: rgba(224,223,228,0.4); --text-dim: rgba(224,223,228,0.2);
    --border-normal: rgba(224,223,228,0.07);
    --accent: #7FB5B0; --accent-dim: rgba(127,181,176,0.12);
    --red: #C47878;
    --glass-bg: linear-gradient(135deg, rgba(224,223,228,0.05) 0%, rgba(224,223,228,0.015) 100%);
    --glass-border: rgba(224,223,228,0.08);
    --glass-highlight: inset 0 1px 0 rgba(224,223,228,0.06);
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--canvas); display: flex; justify-content: center; padding: 40px;
    font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased;
  }
  .diagram {
    width: 760px; background: var(--canvas); border-radius: 16px; overflow: hidden;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }

  /* ── Transform area: side-by-side BEFORE / AFTER ── */
  .transform-area {
    padding: 16px 48px;
    display: flex; flex-direction: column; gap: 24px;
    position: relative;
  }
  .transform-area::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 400px 250px at 50% 50%, rgba(127,181,176,0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  .pref-columns {
    display: grid; grid-template-columns: 1fr 60px 1fr; gap: 0; align-items: start;
    position: relative; z-index: 1;
  }

  .pref-side {
    display: flex; flex-direction: column; gap: 10px;
    min-width: 0;
  }
  .pref-side-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .pref-side-label .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .pref-side-label.before { color: var(--red); }
  .pref-side-label.before .dot { background: var(--red); }
  .pref-side-label.after { color: var(--accent); }
  .pref-side-label.after .dot { background: var(--accent); }

  /* Image-screenshot wrapper — aspect-ratio matches Figma frame */
  .pref-shot {
    aspect-ratio: 520 / 345; width: 100%;
    border-radius: 16px; overflow: hidden; position: relative;
    background: var(--card);
    opacity: 0; animation: mount 0.5s var(--spring) forwards;
    animation-delay: calc(var(--ai, 0) * 60ms);
  }
  .pref-shot img {
    position: absolute; max-width: none; display: block;
  }
  /* Crop positions transcribed from Figma frame transforms */
  .pref-shot.before img {
    left: -0.02%; top: -124.06%; width: 100.04%; height: 327.83%;
  }
  .pref-shot.after img {
    left: 0; top: -227.62%; width: 100%; height: 327.69%;
  }

  /* Center column: vertical gradient lines + breathing arrow */
  .transform-arrow {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding-top: 32px; gap: 12px;
  }
  .arrow-line {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, transparent, rgba(127,181,176,0.3), transparent);
  }

  @keyframes mount {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  /* ─ Iframe-fit narrow widths (case study column ≈ 580px) keep horizontal 3-col ─
     The mobile companion file (-mobile.html) handles true narrow viewports.
     This desktop file only collapses at standalone-viewing extremes (<480px). ─ */
  @media (max-width: 600px) {
    body { padding: 16px; }
    .transform-area { padding: 16px; gap: 16px; }
    .pref-columns { grid-template-columns: 1fr 40px 1fr; }
    .transform-arrow { padding-top: 24px; }
  }
  @media (max-width: 400px) {
    .pref-columns { grid-template-columns: 1fr; gap: 16px; }
    .transform-arrow { padding-top: 4px; flex-direction: row; }
    .transform-arrow .arrow-line { display: none; }
  }

  /* Embed mode */
  body.embedded { padding: 0; min-height: auto; display: block; background: transparent; overflow: hidden; }
  body.embedded .diagram { width: 100%; max-width: none; border-radius: 0; }
</style>
</head>
<body>
<div class="diagram">

  <div class="transform-area">
    <div class="pref-columns">
      <!-- BEFORE column -->
      <div class="pref-side">
        <div class="pref-side-label before"><span class="dot"></span>Before — Vague labels</div>
        <div class="pref-shot before" style="--ai:1">
          <img src="assets/not07-preferences-before.png" alt="Set community alerts — Off / Low / Frequent">
        </div>
      </div>

      <!-- Center transform arrow -->
      <div class="transform-arrow">
        <div class="arrow-line"></div>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="opacity:0.5; animation: breathe 2.5s ease-in-out infinite;">
          <path d="M5 12h14M15 8l4 4-4 4" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="arrow-line"></div>
      </div>

      <!-- AFTER column -->
      <div class="pref-side">
        <div class="pref-side-label after"><span class="dot"></span>After — Concrete labels</div>
        <div class="pref-shot after" style="--ai:1">
          <img src="assets/not07-preferences-after.png" alt="Concrete labels — Mute / All new posts / Popular posts / Off">
        </div>
      </div>
    </div>

  </div>

</div>
<script>if(window!==window.parent)document.body.classList.add('embedded');</script>
<!-- diagram-height-poster v2 -->
<script>
(function () {
  function compute() {
    var d = document.querySelector('.diagram');
    if (d) {
      var rect = d.getBoundingClientRect();
      if (rect.height > 0) return Math.ceil(rect.height);
    }
    return Math.max(
      document.documentElement ? document.documentElement.scrollHeight : 0,
      document.body ? document.body.scrollHeight : 0
    );
  }
  function send() {
    if (!window.parent || window.parent === window) return;
    var h = compute();
    if (h > 0) window.parent.postMessage({ type: 'diagram-height', height: h }, '*');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', send);
  else send();
  window.addEventListener('load', send);
  setTimeout(send, 50); setTimeout(send, 250); setTimeout(send, 1000);
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(send);
    var d = document.querySelector('.diagram');
    if (d) ro.observe(d);
    if (document.body) ro.observe(document.body);
  }
  window.addEventListener('resize', function () {
    requestAnimationFrame(send);
    setTimeout(send, 50);
  });
  // Respond to parent re-measure requests (fires on any iframe-width change)
  window.addEventListener('message', function (e) {
    if (e && e.data && e.data.type === 'request-diagram-height') {
      requestAnimationFrame(send);
    }
  });
})();
</script>
</body>
</html>
