<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tealGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0.04"/>
    </linearGradient>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2dd4bf" fill-opacity="0.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" rx="12" fill="#131313"/>
  <rect x="1" y="1" width="898" height="378" rx="11" fill="none" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Title -->
  <text x="40" y="44" fill="#e8e8e8" font-size="16" font-weight="700" letter-spacing="-0.01em">Community Lifecycle Framework</text>
  <text x="40" y="66" fill="#555" font-size="12" font-weight="500">New communities fail at predictable stages — each needs a different intervention</text>

  <!-- Connection arrows -->
  <line x1="185" y1="160" x2="205" y2="160" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.4" marker-end="url(#arrow2)"/>
  <line x1="355" y1="160" x2="375" y2="160" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.4" marker-end="url(#arrow2)"/>
  <line x1="525" y1="160" x2="545" y2="160" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.4" marker-end="url(#arrow2)"/>
  <line x1="695" y1="160" x2="715" y2="160" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.4" marker-end="url(#arrow2)"/>

  <!-- Stage 1 -->
  <rect x="30" y="100" width="155" height="120" rx="10" fill="url(#tealGrad4)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.35"/>
  <text x="46" y="124" fill="#2dd4bf" font-size="10" font-weight="600" letter-spacing="0.06em">STAGE 1</text>
  <text x="46" y="146" fill="#e8e8e8" font-size="14" font-weight="600">Creation</text>
  <text x="46" y="168" fill="#888" font-size="11">Reduce friction</text>
  <text x="46" y="183" fill="#888" font-size="11">from intent to</text>
  <text x="46" y="198" fill="#888" font-size="11">live subreddit</text>

  <!-- Stage 2 -->
  <rect x="205" y="100" width="155" height="120" rx="10" fill="url(#tealGrad4)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.3"/>
  <text x="221" y="124" fill="#2dd4bf" font-size="10" font-weight="600" letter-spacing="0.06em">STAGE 2</text>
  <text x="221" y="146" fill="#e8e8e8" font-size="14" font-weight="600">Styling</text>
  <text x="221" y="168" fill="#888" font-size="11">Establish visual</text>
  <text x="221" y="183" fill="#888" font-size="11">identity before</text>
  <text x="221" y="198" fill="#888" font-size="11">attracting members</text>

  <!-- Stage 3 -->
  <rect x="380" y="100" width="155" height="120" rx="10" fill="url(#tealGrad4)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.25"/>
  <text x="396" y="124" fill="#2dd4bf" font-size="10" font-weight="600" letter-spacing="0.06em">STAGE 3</text>
  <text x="396" y="146" fill="#e8e8e8" font-size="14" font-weight="600">First Content</text>
  <text x="396" y="168" fill="#888" font-size="11">Seed community</text>
  <text x="396" y="183" fill="#888" font-size="11">with initial posts</text>
  <text x="396" y="198" fill="#888" font-size="11">that set the tone</text>

  <!-- Stage 4 -->
  <rect x="550" y="100" width="155" height="120" rx="10" fill="url(#tealGrad4)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.2"/>
  <text x="566" y="124" fill="#2dd4bf" font-size="10" font-weight="600" letter-spacing="0.06em">STAGE 4</text>
  <text x="566" y="146" fill="#e8e8e8" font-size="14" font-weight="600">First Members</text>
  <text x="566" y="168" fill="#888" font-size="11">Discovery and</text>
  <text x="566" y="183" fill="#888" font-size="11">distribution to</text>
  <text x="566" y="198" fill="#888" font-size="11">potential members</text>

  <!-- Stage 5 -->
  <rect x="720" y="100" width="155" height="120" rx="10" fill="url(#tealGrad4)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.15"/>
  <text x="736" y="124" fill="#2dd4bf" font-size="10" font-weight="600" letter-spacing="0.06em">STAGE 5</text>
  <text x="736" y="146" fill="#e8e8e8" font-size="14" font-weight="600">Sustained</text>
  <text x="736" y="168" fill="#888" font-size="11">Engagement loops</text>
  <text x="736" y="183" fill="#888" font-size="11">and mod tools for</text>
  <text x="736" y="198" fill="#888" font-size="11">ongoing activity</text>

  <!-- Drop-off indicators -->
  <text x="107" y="260" fill="#e8e8e8" font-size="24" font-weight="700" text-anchor="middle">68%</text>
  <text x="107" y="278" fill="#555" font-size="10" text-anchor="middle">start but don't finish</text>

  <text x="282" y="260" fill="#e8e8e8" font-size="24" font-weight="700" text-anchor="middle">45%</text>
  <text x="282" y="278" fill="#555" font-size="10" text-anchor="middle">skip customization</text>

  <text x="457" y="260" fill="#e8e8e8" font-size="24" font-weight="700" text-anchor="middle">52%</text>
  <text x="457" y="278" fill="#555" font-size="10" text-anchor="middle">never post</text>

  <text x="627" y="260" fill="#e8e8e8" font-size="24" font-weight="700" text-anchor="middle">73%</text>
  <text x="627" y="278" fill="#555" font-size="10" text-anchor="middle">no members at 30d</text>

  <text x="797" y="260" fill="#e8e8e8" font-size="24" font-weight="700" text-anchor="middle">81%</text>
  <text x="797" y="278" fill="#555" font-size="10" text-anchor="middle">inactive by 90d</text>

  <!-- Funnel visualization -->
  <rect x="30" y="310" width="845" height="6" rx="3" fill="#1e1e1e"/>
  <rect x="30" y="310" width="845" height="6" rx="3" fill="#2dd4bf" fill-opacity="0.08"/>
  <rect x="30" y="310" width="580" height="6" rx="3" fill="#2dd4bf" fill-opacity="0.12"/>
  <rect x="30" y="310" width="380" height="6" rx="3" fill="#2dd4bf" fill-opacity="0.16"/>
  <rect x="30" y="310" width="210" height="6" rx="3" fill="#2dd4bf" fill-opacity="0.22"/>
  <rect x="30" y="310" width="80" height="6" rx="3" fill="#2dd4bf" fill-opacity="0.35"/>

  <!-- Annotation -->
  <text x="40" y="348" fill="#555" font-size="11">Each stage has different failure modes and requires different design interventions.</text>
  <text x="40" y="365" fill="#555" font-size="11">Drop-off percentages are illustrative of the pattern, not exact metrics.</text>
</svg>
