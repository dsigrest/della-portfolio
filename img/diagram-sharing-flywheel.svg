<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tealGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0.05"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2dd4bf" fill-opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" rx="12" fill="#131313"/>
  <rect x="1" y="1" width="898" height="478" rx="11" fill="none" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Title -->
  <text x="40" y="44" fill="#e8e8e8" font-size="16" font-weight="700" letter-spacing="-0.01em">Sharing Flywheel</text>
  <text x="40" y="66" fill="#555" font-size="12" font-weight="500">Each share is simultaneously a distribution, acquisition, and re-engagement event</text>

  <!-- Central cycle arrows -->
  <ellipse cx="450" cy="280" rx="120" ry="120" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.15" stroke-dasharray="6 4"/>

  <!-- Arrow paths forming the cycle -->
  <path d="M 380 175 Q 310 220 330 300" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.4" marker-end="url(#arrowhead)"/>
  <path d="M 360 340 Q 400 410 490 380" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.4" marker-end="url(#arrowhead)"/>
  <path d="M 540 350 Q 590 290 550 210" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.4" marker-end="url(#arrowhead)"/>
  <path d="M 520 175 Q 470 150 410 170" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.4" marker-end="url(#arrowhead)"/>

  <!-- Center label -->
  <text x="450" y="276" fill="#2dd4bf" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.08em">FLYWHEEL</text>
  <text x="450" y="292" fill="#555" font-size="10" text-anchor="middle">Each revolution</text>
  <text x="450" y="304" fill="#555" font-size="10" text-anchor="middle">accelerates the next</text>

  <!-- Node 1: Share (top) -->
  <rect x="370" y="105" width="160" height="60" rx="10" fill="url(#tealGrad2)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.4"/>
  <text x="450" y="132" fill="#e8e8e8" font-size="13" font-weight="600" text-anchor="middle">Share</text>
  <text x="450" y="150" fill="#888" font-size="10" text-anchor="middle">User sends content out</text>

  <!-- Node 2: Preview (left) -->
  <rect x="210" y="290" width="160" height="60" rx="10" fill="url(#tealGrad2)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.4"/>
  <text x="290" y="317" fill="#e8e8e8" font-size="13" font-weight="600" text-anchor="middle">Preview</text>
  <text x="290" y="335" fill="#888" font-size="10" text-anchor="middle">Rich link in destination</text>

  <!-- Node 3: Visit (bottom) -->
  <rect x="420" y="370" width="160" height="60" rx="10" fill="url(#tealGrad2)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.4"/>
  <text x="500" y="397" fill="#e8e8e8" font-size="13" font-weight="600" text-anchor="middle">Visit</text>
  <text x="500" y="415" fill="#888" font-size="10" text-anchor="middle">New user lands on Reddit</text>

  <!-- Node 4: Engage (right) -->
  <rect x="550" y="200" width="160" height="60" rx="10" fill="url(#tealGrad2)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.4"/>
  <text x="630" y="227" fill="#e8e8e8" font-size="13" font-weight="600" text-anchor="middle">Engage</text>
  <text x="630" y="245" fill="#888" font-size="10" text-anchor="middle">Upvote, comment, join</text>

  <!-- Stage annotations (right side) -->
  <rect x="740" y="110" width="140" height="90" rx="8" fill="#191919" stroke="#1e1e1e" stroke-width="1"/>
  <text x="752" y="133" fill="#2dd4bf" font-size="10" font-weight="600" letter-spacing="0.05em">STAGE 1</text>
  <text x="752" y="150" fill="#888" font-size="11">Streamline share</text>
  <text x="752" y="165" fill="#888" font-size="11">sheet + expand</text>
  <text x="752" y="180" fill="#888" font-size="11">channels</text>

  <rect x="740" y="215" width="140" height="90" rx="8" fill="#191919" stroke="#1e1e1e" stroke-width="1"/>
  <text x="752" y="238" fill="#2dd4bf" font-size="10" font-weight="600" letter-spacing="0.05em">STAGE 2</text>
  <text x="752" y="255" fill="#888" font-size="11">Improve link</text>
  <text x="752" y="270" fill="#888" font-size="11">previews +</text>
  <text x="752" y="285" fill="#888" font-size="11">embeds</text>

  <rect x="740" y="320" width="140" height="90" rx="8" fill="#191919" stroke="#1e1e1e" stroke-width="1"/>
  <text x="752" y="343" fill="#2dd4bf" font-size="10" font-weight="600" letter-spacing="0.05em">STAGE 3</text>
  <text x="752" y="360" fill="#888" font-size="11">Privacy controls</text>
  <text x="752" y="375" fill="#888" font-size="11">as a growth</text>
  <text x="752" y="390" fill="#888" font-size="11">lever</text>

  <!-- Insight callout -->
  <rect x="20" y="400" width="190" height="60" rx="8" fill="#191919" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.2"/>
  <text x="32" y="422" fill="#e8e8e8" font-size="11" font-weight="600">Key insight</text>
  <text x="32" y="440" fill="#888" font-size="10">Privacy controls increased</text>
  <text x="32" y="452" fill="#888" font-size="10">total sharing volume</text>
</svg>
