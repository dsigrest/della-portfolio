# Portfolio Site Quality Gate Workflow
#
# This workflow ensures Della's portfolio maintains high quality standards.
# It runs automatically whenever code is pushed to main or a PR is created.
#
# WHAT IT DOES:
# 1. Code Quality Check: HTML validation, link integrity, accessibility, file sizes
# 2. Voice Consistency: Checks all content against Della's voice rules
# 3. Lighthouse Audit: Tests live site for performance, accessibility, SEO
# 4. Image Size Check: Flags oversized images
#
# WHERE TO FIND RESULTS:
# - GitHub > Actions tab: See the full workflow run details
# - Pull Requests: Status checks block merge if quality/voice fail
# - Artifacts section: Download Lighthouse report for detailed metrics
#
# THRESHOLDS:
# - Quality check: must pass (exit 0) or merge is blocked
# - Voice check: must pass (exit 0) or merge is blocked
# - Lighthouse: Performance >=70, Accessibility >=90, Best Practices >=80, SEO >=90
#   (Tuned for a static portfolio site — no PWA requirements)
# - Images: warn on >500KB (doesn't block)

name: Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1: Code Quality Checks — BLOCKS MERGE ON FAILURE
  quality-check:
    runs-on: ubuntu-latest
    name: Code Quality
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run quality checks
        run: python3 quality-check.py

  # JOB 2: Voice Consistency — BLOCKS MERGE ON FAILURE
  voice-check:
    runs-on: ubuntu-latest
    name: Voice Consistency
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run voice consistency check
        run: python3 voice-check.py

  # JOB 3: Lighthouse Performance Audit — BLOCKS MERGE ON FAILURE
  lighthouse:
    runs-on: ubuntu-latest
    name: Lighthouse Audit
    needs: [quality-check, voice-check]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://della-portfolio.vercel.app/
          configPath: './.github/lighthouse-config.json'
          uploadArtifacts: true
          artifactName: lighthouse-report

  # JOB 4: Image Size Warnings — does NOT block merge
  image-check:
    runs-on: ubuntu-latest
    name: Image Size Check
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Find oversized images
        run: |
          echo "Scanning for images larger than 500KB..."
          LARGE_IMAGES=$(find ./img -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" -o -name "*.webp" \) -size +500k)
          if [ -z "$LARGE_IMAGES" ]; then
            echo "All images are under 500KB!"
          else
            echo "Found oversized images that should be optimized:"
            echo "$LARGE_IMAGES" | while read img; do
              SIZE=$(du -h "$img" | cut -f1)
              echo "  - $img ($SIZE)"
            done
          fi
        continue-on-error: true
